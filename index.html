<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light">
<title>捡文学编辑器</title>
<style>
  :root{
    --bg:#f5f6f8; --panel:#fff; --border:#e6e6e9; --text:#1f2329; --muted:#8a9099;
    --accent:#3b6fff; --danger:#e5484d; --page:#f0f1f3;
    --font:"PingFang SC","Microsoft YaHei",system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--font); background:var(--bg); color:var(--text); font-size:15px; -webkit-font-smoothing:antialiased;}

  /* Buttons */
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:6px; min-height:40px; padding:0 16px;
    border:1px solid var(--border); background:#fff; color:var(--text); border-radius:10px; font-size:14px;
    cursor:pointer; font-family:inherit; transition:.15s;}
  .btn:hover{background:#f7f8fa;}
  .btn-primary{background:var(--accent); color:#fff; border-color:var(--accent);}
  .btn-primary:hover{filter:brightness(.96); background:var(--accent);}
  .btn-ghost{background:transparent;}
  .btn-danger{color:var(--danger); border-color:#f3c2c4; background:#fff;}
  .btn-danger:hover{background:#fdeced;}
  .btn-block{width:100%; margin-top:14px;}
  .btn-sm{min-height:34px; padding:0 12px; font-size:13px;}
  .btn-mini{min-height:32px; padding:0 10px; font-size:13px; border-radius:8px;}

  /* SVG 文本图标体系 */
  .icon-svg{ display:inline-flex; align-items:center; justify-content:center; vertical-align:middle; line-height:0; }
  .icon-svg svg{ width:18px; height:18px; display:block; }
  .icon-svg.icon-lg svg{ width:22px; height:22px; }
  .btn-mini .icon-svg svg{ width:14px; height:14px; }

  /* 引用自定义下拉 */
  .quote-dropdown{ position:relative; display:inline-flex; }
  .quote-dropdown-btn{ display:inline-flex; align-items:center; gap:4px; }
  .quote-dropdown-menu{ position:absolute; top:100%; left:0; margin-top:4px; min-width:100px; background:#fff; border:1px solid var(--border); border-radius:8px; box-shadow:0 4px 12px rgba(0,0,0,.08); z-index:100; overflow:hidden; }
  .quote-dropdown-item{ padding:8px 12px; font-size:13px; cursor:pointer; white-space:nowrap; }
  .quote-dropdown-item:hover{ background:#f2f3f5; }
  .quote-dropdown-item.active{ background:var(--accent); color:#fff; }

  /* 实时同步中转圈遮罩 */
  .sync-spinner-overlay{ position:fixed; inset:0; background:rgba(255,255,255,.72); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; z-index:9999; }
  .sync-spinner{ width:36px; height:36px; border:4px solid #e3e6ea; border-top-color:#3b82f6; border-radius:50%; animation:spin .8s linear infinite; }
  .sync-spinner-text{ font-size:14px; color:#1f2329; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .btn.is-on{background:#eef0f3; color:var(--text);}
  .op-toggle{color:var(--muted);}
  .op-toggle.active{background:var(--accent); color:#fff; border-color:var(--accent);}

  /* Inputs */
  .inp{width:100%; min-height:40px; padding:9px 12px; border:1px solid var(--border); border-radius:10px;
    font-size:14px; font-family:inherit; color:var(--text); background:#fff;}
  .inp:focus{outline:none; border-color:var(--accent);}
  .inp-sm{min-height:34px; padding:6px 10px; font-size:13px; width:auto;}
  .ta{width:100%; min-height:90px; padding:10px 12px; border:1px solid var(--border); border-radius:10px;
    font-size:14px; font-family:inherit; resize:vertical; color:var(--text);}
  .ta:focus{outline:none; border-color:var(--accent);}

  /* Segmented toggle */
  .seg{display:inline-flex; border:1px solid var(--border); border-radius:10px; overflow:hidden;}
  .seg-btn{border:none; background:#fff; padding:0 16px; min-height:40px; font-size:14px; cursor:pointer; color:var(--muted); font-family:inherit;}
  .seg-btn.active{background:var(--accent); color:#fff;}

  /* Top bar */
  .topbar{display:flex; align-items:center; gap:10px; padding:12px 16px; background:#fff;
    border-bottom:1px solid var(--border); position:sticky; top:0; z-index:20; flex-wrap:wrap;}
  .title-edit{flex:1; min-width:120px;}
  .title-btn{font-size:16px; font-weight:600; padding:8px 6px; cursor:pointer; border-radius:8px;}
  .title-btn:hover{background:#f2f3f5;}
  .title-input{font-size:16px; font-weight:600; width:100%;}

  /* Settings — 底部悬浮小窗 popover */
  .settings{position:absolute; top:calc(100% + 8px); right:0; width:280px; background:#fff;
    border:1px solid #e5e6eb; border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,.12);
    padding:12px; z-index:50; display:none;}
  .settings.open{display:block;}
  .settings-body{display:flex; flex-direction:column; gap:10px;}
  .set-row{display:flex; align-items:center; justify-content:space-between; gap:12px; font-size:14px;}
  .set-row > span{ white-space:nowrap; flex-shrink:0; }
  .set-row > div{ flex:1; min-width:0; display:flex; align-items:center; justify-content:flex-end; }
  /* 封面图上传：横排 + icon 按钮 */
  .cover-upload-row{ display:flex; align-items:center; gap:8px; }
  .cover-upload-row > span{ font-size:13px; color:var(--muted); white-space:nowrap; }
  .cover-upload-row > input[type="file"]{ display:none; }
  .cover-upload-btn{ display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; padding:0; border-radius:6px; border:1px solid #e5e6eb; background:#fff; color:#444; cursor:pointer; }
  .cover-upload-btn:hover{ background:#f5f5f5; }
  .cover-upload-btn .icon-svg svg{ width:16px; height:16px; }

  /* 封面顶部：标签 + 圆 + 楼主 id 同行 */
  .cover-top{display:flex; align-items:center; gap:10px; margin-bottom:8px;}
  .cover-label{font-size:13px; font-weight:600; color:var(--muted); white-space:nowrap;}
  .cover-circle-wrap{position:relative; width:36px; height:36px; min-width:36px;}
  .cover-circle{position:relative; width:36px; height:36px; min-width:36px; border-radius:50%;
    background:#f2f3f5; display:flex; align-items:center; justify-content:center; cursor:pointer;
    overflow:hidden; border:1px solid #e5e6eb;}
  .cover-circle-img{width:100%; height:100%; object-fit:cover; display:block;}
  .cover-circle-plus{color:#646a73; font-size:20px; line-height:1; font-weight:300;}
  .cover-circle-del{position:absolute; top:-5px; right:-5px; z-index:2; width:16px; height:16px; border:none;
    border-radius:50%; background:rgba(0,0,0,.55); color:#fff; cursor:pointer; font-size:12px;
    line-height:16px; padding:0;}
  .cover-top .inp{flex:1; min-width:0;}

  /* 预览封面头像占位（只读） */
  .pv-avatar-placeholder{width:32px; height:32px; border-radius:50%; background:#f2f3f5;
    border:1px solid #e5e6eb; display:block;}

  /* Editor layout: two-column (wide) / single-column toggle (narrow) */
  #app.editor-view{ display:flex; flex-direction:column; height:100vh; overflow:hidden; }
  #app.editor-view .editor-content{ flex:1 1 auto; min-height:0; display:flex; padding:0; }
  .editor-body{ display:flex; flex:1 1 auto; min-height:0; }
  /* 固定 70/30 比例（flex-grow 7:3，basis 0），flex-shrink 固定为 0，避免宽度随内容抖动；
     scrollbar-gutter:stable 让滚动条占位恒定，内容宽度不再跳动；中间分隔线常驻 */
  .col-edit{ flex:7 0 0; min-width:0; min-height:0; overflow:auto; scrollbar-gutter:stable; padding:16px 16px 16px 28px; }
  .col-preview{ flex:3 0 0; min-width:0; min-height:0; overflow:auto; scrollbar-gutter:stable; padding:16px; background:var(--bg); }
  .col-divider{ flex:0 0 1px; align-self:stretch; min-width:1px; background:var(--border); }

  /* 细而淡的滚动条，降低视觉重心 */
  .col-edit, .col-preview, .modal, .settings {
    scrollbar-width: thin;
    scrollbar-color: rgba(0,0,0,0.16) transparent;
  }
  .col-edit::-webkit-scrollbar,
  .col-preview::-webkit-scrollbar,
  .modal::-webkit-scrollbar,
  .settings::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }
  .col-edit::-webkit-scrollbar-track,
  .col-preview::-webkit-scrollbar-track,
  .modal::-webkit-scrollbar-track,
  .settings::-webkit-scrollbar-track {
    background: transparent;
  }
  .col-edit::-webkit-scrollbar-thumb,
  .col-preview::-webkit-scrollbar-thumb,
  .modal::-webkit-scrollbar-thumb,
  .settings::-webkit-scrollbar-thumb {
    background: rgba(0,0,0,0.16);
    border-radius: 3px;
  }
  .col-edit::-webkit-scrollbar-thumb:hover,
  .col-preview::-webkit-scrollbar-thumb:hover,
  .modal::-webkit-scrollbar-thumb:hover,
  .settings::-webkit-scrollbar-thumb:hover {
    background: rgba(0,0,0,0.28);
  }
  @media (max-width:1023px){
    .editor-body{ flex-direction:column; }
    .col-edit, .col-preview{ flex:1 1 auto; width:100%; }
    .col-divider{ display:none; }
  }
  .editor-content{padding:16px;}
  .edit-wrap{max-width:720px; margin:0 auto; display:flex; flex-direction:column; gap:14px;}
  .edit-block{display:flex; flex-direction:column; gap:8px;}
  .edit-label{font-size:13px; font-weight:600; color:var(--muted); margin-bottom:2px;}
  .floor-op{display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .drag-handle{cursor:grab; color:var(--muted); font-size:18px; padding:4px 6px; user-select:none;}
  .floor-num{font-weight:700; color:#646a73; font-size:15px;}
  .id-inp{min-height:34px; padding:6px 10px; font-size:13px; width:auto; min-width:96px; max-width:150px;}
  .content-ta{width:100%; min-height:38px; padding:9px 12px; border:1px solid var(--border); border-radius:10px;
    font-size:14px; font-family:inherit; line-height:1.5; resize:none; overflow:hidden; color:var(--text);}
  .content-ta:focus{outline:none; border-color:var(--accent);}
  .floor-card.dragging{opacity:.5;}
  .floor-card.over{box-shadow:0 0 0 2px rgba(59,111,255,.15);}

  /* Image area */
  .img-area{display:flex; flex-direction:column; gap:8px;}
  .img-grid{display:flex; flex-wrap:wrap; gap:8px;}
  .img-cell{position:relative; width:72px; height:72px; border-radius:10px; overflow:hidden; border:1px solid var(--border);}
  .img-thumb{width:100%; height:100%; object-fit:cover; display:block;}
  .img-del{position:absolute; top:2px; right:2px; width:20px; height:20px; border:none; border-radius:50%;
    background:rgba(0,0,0,.55); color:#fff; cursor:pointer; font-size:14px; line-height:20px; padding:0;}

  /* Phone frame (preview / export baseline) */
  .phone-frame{max-width:420px; margin:0 auto; background:#fff; border-radius:28px;
    box-shadow:0 12px 40px rgba(0,0,0,.12); padding:14px; min-height:55vh;}
  @media(min-width:760px){ .phone-frame{border:10px solid #111;} }
  .feed{display:block;}
  .pv-cover-title{font-size:20px; font-weight:700; color:#1f2329; white-space:pre-wrap; word-break:break-word; margin-bottom:8px;}
  .pv-body{font-size:15px; line-height:1.6; color:#333; white-space:pre-wrap; word-break:break-word;}
  .pv-img{display:block; width:100%; margin-top:10px; border-radius:10px;}
  .pv-line{display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:6px;}
  .pv-left{display:flex; align-items:baseline; gap:6px; min-width:0;}
  .pv-num{font-weight:700; color:#646a73; font-size:15px;}
  .pv-author2{font-size:14px; color:#333; font-weight:500; white-space:pre-wrap; word-break:break-word;}
  .pv-time2{font-size:12px; color:#a0a6ad; margin-left:auto; white-space:nowrap;}
  .pv-quote2{font-size:13px; color:#7a818a; background:#f6f7f9; border-radius:6px; padding:8px 10px; margin-bottom:8px; white-space:pre-wrap; word-break:break-word;}
  .pv-op-tag{display:inline-flex; align-items:center; font-size:12px; color:#646a73; background:#f2f3f5; border-radius:9px; padding:1px 7px; line-height:1.5; white-space:nowrap;}
  .pv-cover-head{display:flex; align-items:center; gap:8px; margin-bottom:8px;}
  .pv-avatar{width:32px; height:32px; border-radius:50%; object-fit:cover; border:1px solid #e5e6eb; display:block;}
  .pv-author{font-size:14px; font-weight:500; color:#333;}
  .pv-hr{border:none; border-top:1px solid #e5e6eb; margin:16px 0;}

  /* Home */
  .home-header{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:20px 16px; flex-wrap:wrap;}
  .home-header h1{font-size:22px; margin:0;}
  .home-actions{display:flex; gap:10px;}
  .empty{text-align:center; color:var(--muted); padding:60px 16px; font-size:15px;}
  .card-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; padding:0 16px 30px;}
  .proj-card{background:#fff; border:1px solid var(--border); border-radius:14px; overflow:hidden; cursor:pointer;
    display:flex; flex-direction:column; transition:.15s;}
  .proj-card:hover{box-shadow:0 6px 18px rgba(0,0,0,.08);}
  .thumb{width:100%; aspect-ratio:3/4; background:#eef0f3; position:relative; overflow:hidden;}
  .thumb-img{width:100%; height:100%; object-fit:cover; display:block;}
  .thumb-ph{width:100%; height:100%; display:flex; align-items:center; justify-content:center; padding:12px;
    text-align:center; font-weight:600; color:#9aa1a9; font-size:15px;}
  /* 捡手机封面：对话预览缩略图（微信风 mini 气泡） */
  .thumb-chat-preview{flex-direction:column; align-items:stretch; justify-content:flex-start; gap:10px;
    text-align:left; font-weight:400; color:#333; font-size:13px; padding:14px; background:#ededed; box-sizing:border-box;}
  .tcp-head{font-weight:600; color:#8a9099; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .tcp-row{display:flex; align-items:flex-start; gap:10px;}
  .tcp-avatar{flex:0 0 34px; width:34px; height:34px; border-radius:4px; overflow:hidden; background:#5b8def;
    color:#fff; display:flex; align-items:center; justify-content:center; font-size:15px;}
  .tcp-avatar-img{width:100%; height:100%; object-fit:cover; display:block; border-radius:4px;}
  .tcp-avatar-ph{width:100%; height:100%; display:flex; align-items:center; justify-content:center; border-radius:4px;}
  .tcp-bubble-wrap{flex:1 1 auto; min-width:0; display:flex; flex-direction:column; gap:3px;}
  .tcp-name{font-size:11px; color:#8a9099; line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .tcp-bubble{background:#fff; border-radius:8px; padding:8px 10px; font-size:13px;
    line-height:1.4; color:#333; max-height:56px; overflow:hidden; position:relative; box-shadow:0 1px 2px rgba(0,0,0,.06);}
  .proj-meta{padding:10px 12px;}
  .proj-title{font-size:15px; font-weight:600; color:#1f2329; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .proj-sub{font-size:12px; color:var(--muted); margin-top:3px;}
  .proj-acts{display:flex; gap:8px; padding:0 12px 12px;}
  .proj-acts .btn-mini{flex:1;}

  /* Modal */
  .backdrop{position:fixed; inset:0; background:rgba(0,0,0,.35); display:flex; align-items:center; justify-content:center;
    z-index:100; padding:16px;}
  .modal{background:#fff; border-radius:16px; padding:20px; max-width:460px; width:100%; position:relative;
    max-height:90vh; overflow:auto;}
  .modal-close{position:absolute; top:10px; right:12px; border:none; background:none; font-size:22px; cursor:pointer;
    color:var(--muted); line-height:1;}
  .modal-body h3{margin:0 0 14px; font-size:17px;}
  .modal-row{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
  .modal-row.modal-actions{justify-content:flex-end; gap:10px;}
  .modal-row label{font-size:14px; color:var(--text);}
  /* setup 模式（聊天设置）底部 footer：始终可见，与上方 +添加成员 间距 ≥24px */
  .wx-modal-footer{display:flex; align-items:center; justify-content:flex-end; gap:10px; margin-top:24px;}
  .long-results{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; margin-top:8px;}
  .page-card{border:1px solid var(--border); border-radius:10px; padding:8px; display:flex; flex-direction:column;
    gap:6px; align-items:center;}
  .page-thumb{width:100%; border-radius:6px; border:1px solid var(--border);}
  .page-no{font-size:12px; color:var(--muted);}

  /* Export menu */
  .export-menu{position:fixed; background:#fff; border:1px solid var(--border); border-radius:10px;
    box-shadow:0 8px 24px rgba(0,0,0,.12); z-index:60; min-width:160px; overflow:hidden;}
  .export-item{padding:11px 14px; cursor:pointer; font-size:14px;}
  .export-item:hover{background:#f2f3f5;}

  @media(max-width:520px){
    .card-grid{grid-template-columns:1fr;}
    .home-header{flex-direction:column; align-items:stretch;}
    .home-actions .btn{flex:1;}
  }

  /* ===================== 捡手机文学（微信风） .wx-* 命名空间 ===================== */
  #app.editor-view .wx-content{ flex:1 1 auto; min-height:0; display:flex; flex-direction:column; }
  .wx-content{ flex:1 1 auto; min-height:0; display:flex; flex-direction:column; }
  .wx-shell{ flex:1 1 auto; min-height:0; display:flex; flex-direction:column; background:var(--bg); }
  .wx-detail{ background:#ededed; }

  /* 捡手机文学：主按钮用微信绿（覆盖全局蓝色 --accent），仅作用于聊天外壳，不影响论坛体 */
  .wx-shell .btn-primary{ background:#95EC69; border-color:#8adf5f; color:#1f1f1f; }
  .wx-shell .btn-primary:hover{ filter:brightness(.96); background:#95EC69; }
  /* 捡手机弹窗（挂载于 #modal-root，不在 .wx-shell 内）：主按钮同样用微信绿 */
  .wx-modal-pickup .btn-primary{ background:#95EC69; border-color:#8adf5f; color:#1f1f1f; }
  .wx-modal-pickup .btn-primary:hover{ filter:brightness(.96); background:#95EC69; }

  /* 导航栏 */
  .wx-navbar{ display:flex; align-items:center; gap:10px; padding:10px 14px; background:#f7f7f7;
    border-bottom:1px solid #e3e3e3; position:sticky; top:0; z-index:10; }
  .wx-navbar-title{ font-size:16px; font-weight:600; color:#1f1f1f; flex:1; min-width:0;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  /* 聊天详情列内标题栏（编辑区 / 预览区各自顶部，微信风格） */
  .wx-detail-bar{ display:flex; align-items:center; gap:10px; height:46px; padding:0 12px;
    background:#fff; border-bottom:1px solid #e5e6eb; flex:0 0 auto; }
  .wx-detail-bar .wx-db-back{ border:none; background:transparent; cursor:pointer; font-size:18px;
    line-height:1; color:#1f1f1f; padding:0 4px; }
  .wx-detail-bar .wx-db-title{ flex:1; min-width:0; text-align:center; font-size:16px; font-weight:600;
    color:#1f1f1f; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .wx-detail-bar .wx-db-gear{ border:none; background:transparent; cursor:pointer; font-size:18px;
    line-height:1; color:#1f1f1f; padding:0 4px; }
  /* 手机端：列内标题栏已是聊天头部，隐藏外层总导航栏避免双栏 */
  @media (max-width:759px){ .wx-navbar{ display:none; } }

  /* 聊天列表 */
  .wx-chatlist{ flex:1 1 auto; min-height:0; overflow:auto; background:#fff; }
  .wx-chatitem{ display:flex; align-items:center; gap:12px; padding:10px 14px; border-bottom:1px solid #f0f0f0;
    cursor:pointer; }
  .wx-chatitem:hover{ background:#f7f8fa; }
  .wx-chatitem.active{ background:#e6f7e6; border-left:3px solid #95EC69; }
  .wx-chatitem-main{ flex:1; min-width:0; }
  .wx-chatitem-name{ font-size:15px; color:#1f1f1f; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .wx-chatitem-snip{ font-size:13px; color:#9a9a9a; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
  .wx-chatitem-right{ display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
  .wx-chatitem-time{ font-size:11px; color:#b3b3b3; }
  .wx-chatitem-del{ border:none; background:#f2f3f5; color:#9a9a9a; width:20px; height:20px; border-radius:50%;
    cursor:pointer; font-size:14px; line-height:20px; padding:0; }
  .wx-chatitem-del:hover{ background:#fdeced; color:var(--danger); }

  /* 头像 */
  .wx-avatar{ width:36px; height:36px; min-width:36px; border-radius:6px; overflow:hidden; background:#c8c9cc;
    display:flex; align-items:center; justify-content:center; color:#fff; font-size:15px; }
  .wx-avatar.wx-avatar-sm{ width:40px; height:40px; min-width:40px; border-radius:8px; font-size:16px; }
  .wx-avatar-img{ width:100%; height:100%; object-fit:cover; display:block; }
  .wx-avatar-ph{ width:100%; height:100%; display:flex; align-items:center; justify-content:center; }

  /* 小三角：附着在气泡(.wx-bubble)左右边缘中央，与气泡同色；头像(.wx-avatar)上无 ::before 三角 */
  .wx-bubble.me::before{

  .wx-bubble.other::before{
    content:''; position:absolute; top:12px; left:-7px; width:0; height:0;

  .wx-pending-x{ position:absolute; top:-5px; right:-5px; width:16px; height:16px; border:none; border-radius:50%;

  .wx-inputbar{ display:flex; align-items:flex-end; gap:8px; padding:8px 10px; }
  .wx-idbtn{ flex:0 0 88px; width:88px; min-height:38px; padding:0 8px; border:1px solid #dcdcdc; background:#fff; border-radius:8px;

  }catch(e){ console.error('showFatal failed', e); }
}
window.addEventListener('error', (e)=>{ if(e && e.target && e.target !== window) return; showFatal((e && e.message ? e.message : '未知错误') + (e && e.filename ? '\n@ '+e.filename+':'+e.lineno : '')); });

function el(tag, attrs, ...children){
  const e=document.createElement(tag);
  attrs=attrs||{};
  for(const k in attrs){
    const v=attrs[k];
    if(v==null||v===false) continue;
    if(k==='class') e.className=v;
    else if(k==='value') e.value=v;
    else if(k==='style') e.style.cssText=v;
    else if(k==='html') e.innerHTML=v;
    else if(k.slice(0,2)==='on' && typeof v==='function') e.addEventListener(k.slice(2).toLowerCase(), v);
    else if(v===true) e.setAttribute(k,'');
    else e.setAttribute(k, v);
  }
  const list = children.flat(Infinity);
  for(const c of list){
    if(c==null) continue;

/* ===== 捡手机文学归一化（缺省安全） ===== */
function normalizePickup(p){
  p=p||{};
  const d=p.data||{};
  const s=d.settings||{};
  const chats=(d.chats||[]).map(c=>normalizeChat(c));
  return { id:p.id||uid(), title:p.title||'未命名捡手机', createdAt:p.createdAt||now(), updatedAt:p.updatedAt||now(),
    type:'pickup',
    data:{ settings:{ showTime:s.showTime!==false, theme:s.theme||'wechat', pageRatio:s.pageRatio||'9:16', pageHeightPx:s.pageHeightPx!=null?s.pageHeightPx:null },
      coverImage:(d.coverImage && d.coverImage.dataUrl)?d.coverImage:null,
      chats } };
}
function normalizeChat(c){
  c=c||{};
  const members=(c.members||[]).map(m=>normalizeMember(m));
  if(members.length && !members.some(m=>m.isMe)) members[0].isMe=true;
  const messages=(c.messages||[]).map(m=>normalizeMessage(m));
  return { id:c.id||uid(), name:c.name||'', type:members.length>=3?'group':'single',
    order:typeof c.order==='number'?c.order:0, members, messages };
}
function normalizeMember(m){
  m=m||{};
  return { id:m.id||uid(), name:m.name||'', avatar:(m.avatar&&m.avatar.dataUrl)?m.avatar:null,
    isMe:!!m.isMe, blocked:!!m.blocked };
}
function normalizeMessage(m){
  m=m||{};
  return { id:m.id||uid(), senderId:m.senderId||null, type:m.type||'text', text:m.text||'',
    image:(m.image&&m.image.dataUrl)?m.image:null,
    voice:(m.voice&&m.voice.durationSec!=null)?{durationSec:m.voice.durationSec, transcript:m.voice.transcript||''}:null,
    quote:(m.quote&&m.quote.messageId)?{messageId:m.quote.messageId, snippet:m.quote.snippet||''}:null,
    withdrawn:!!m.withdrawn, blocked:!!m.blocked, nudge:(m.nudge&&m.nudge.fromId&&m.nudge.toId)?{fromId:m.nudge.fromId,toId:m.nudge.toId}:null,
    isSystem:m.type==='system', kind:m.kind||null, pageBreak:!!m.pageBreak, time:m.time||now() };
}
function newFloor(){ return { id:uid(), author:'', content:'', time:'', images:[], quote:null, isOP:false }; }

/** 纯函数：返回 floor.id -> 楼层号 的映射 */
function renumber(floors){
  const m=new Map();
  (floors||[]).forEach((f,i)=>m.set(f.id,i+1));
  return m;
}
/** 纯函数：解析某楼层的引用目标 */
function resolveQuote(floor, allFloors, cover){
  if(!floor || !floor.quote) return {found:false};
  if(floor.quote==='cover'){
    return {found:!!cover, type:'cover', author:null, floorNumber:null, content:(cover&&cover.body)||''};
  }
  const idx=(allFloors||[]).findIndex(f=>f.id===floor.quote);
  if(idx<0) return {found:false};
  const target=allFloors[idx];
  return {found:true, type:'floor', author:target.author, floorNumber:idx+1, content:target.content||''};
}
/** 纯函数：按页高分页（整块不跨页截断） */
function splitPages(blocks, pageHeight, measureFn){
  const pages=[]; let cur=[]; let curY=PAGE_PAD;
  for(const b of blocks){
    const h=measureFn(b)+GAP;
    // 翻页阈值需补回尾部 GAP：curY 已含已放置块的尾部间距，h 又含下一块间距，
    // 正确不溢出条件为 used<=pageHeight，即 curY+h > pageHeight-PAGE_PAD+GAP 时才翻页。
    if(curY>PAGE_PAD && curY+h>pageHeight-PAGE_PAD+GAP){ pages.push(cur); cur=[]; curY=PAGE_PAD; }
    cur.push(b); curY+=h;
  }
  if(cur.length) pages.push(cur);
  return pages;
}
/** 纯函数：序列化 / 反序列化 */
function serialize(project){ return JSON.stringify({version:1, project}); }
function deserialize(text){ const o=JSON.parse(text); return o.project?o.project:o; }

/* ---------- 图片工具 ---------- */
function fileToDataURL(file){
  return new Promise((res,rej)=>{ const r=new FileReader();
    r.onload=()=>res(r.result); r.onerror=()=>rej(r.error); r.readAsDataURL(file); });
}
async function handleImageFiles(files, targetArr){
  for(const f of (files||[])){
    if(!f || !f.type || !f.type.startsWith('image/')) continue;
    const url=await fileToDataURL(f);
    targetArr.push({id:uid(), dataUrl:url, name:f.name||'image'});
  }
}
function makePasteHandler(images, onChange){
  return async (e)=>{
    const items=e.clipboardData && e.clipboardData.items;
    if(!items) return;
    const files=[];
    for(const it of items){ if(it.type && it.type.startsWith('image/')){ const f=it.getAsFile(); if(f) files.push(f); } }
    if(files.length){ e.preventDefault(); await handleImageFiles(files, images); onChange(); }
  };
}

/* ---------- 存储兜底：IndexedDB 不可用 → 内存模式 ---------- */
const __memStore = new Map();
let __usingMemory = false;
function __memAll(){ return [...__memStore.values()]; }

/* ---------- IndexedDB ---------- */
function openDB(){
  return new Promise((res,rej)=>{
    try{
      if(typeof indexedDB === 'undefined'){ __usingMemory = true; return res(null); }
      const req = indexedDB.open('forum-novel-db', 1);
      req.onupgradeneeded = ()=>{ try{ req.result.createObjectStore('projects',{keyPath:'id'}); }catch(e){} };
      req.onsuccess = ()=> res(req.result);
      req.onerror = ()=>{ __usingMemory = true; res(null); };   // 降级而非 reject
    }catch(e){ __usingMemory = true; res(null); }
  });
}
async function idbGetAll(){
  if(__usingMemory) return __memAll();
  const db=await openDB(); if(!db) return [];
  return new Promise((res,rej)=>{ const tx=db.transaction('projects','readonly');
    const r=tx.objectStore('projects').getAll(); r.onsuccess=()=>res(r.result||[]); r.onerror=()=>rej(r.error); });
}
async function idbGet(id){
  if(__usingMemory) return __memStore.get(id)||null;
  const db=await openDB(); if(!db) return null;
  return new Promise((res,rej)=>{ const tx=db.transaction('projects','readonly');
    const r=tx.objectStore('projects').get(id); r.onsuccess=()=>res(r.result||null); r.onerror=()=>rej(r.error); });
}
async function idbPut(project){
  if(__usingMemory){ __memStore.set(project.id, project); return; }
  const db=await openDB(); if(!db) return;
  return new Promise((res,rej)=>{ const tx=db.transaction('projects','readwrite');
    tx.objectStore('projects').put(project); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); });
}
async function idbDelete(id){
  if(__usingMemory){ __memStore.delete(id); return; }
  const db=await openDB(); if(!db) return;
  return new Promise((res,rej)=>{ const tx=db.transaction('projects','readwrite');
    tx.objectStore('projects').delete(id); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); });
}

function buildHomeCard(p){
  if(!p || !p.data) p={data:{}, title:'未命名小说'};
  const card=el('div',{class:'proj-card'});
  const isPickup = p.type==='pickup';
  const thumb=el('div',{class:'thumb'});
  let coverImg=null;
  if(p.data.coverImage && p.data.coverImage.dataUrl){
    coverImg=p.data.coverImage;
  } else if(!isPickup){
    coverImg=p.data.cover && p.data.cover.images && p.data.cover.images[0];
  }
  if(coverImg) thumb.appendChild(el('img',{class:'thumb-img', src:coverImg.dataUrl, alt:''}));
  else thumb.appendChild(buildThumbPlaceholder(p, isPickup));
  card.appendChild(thumb);

  const meta=el('div',{class:'proj-meta'});
  meta.appendChild(el('div',{class:'proj-title'}, p.title||'未命名小说'));
  const sub = isPickup
    ? ((p.data.chats?p.data.chats.length:0)+' 个聊天 · '+formatDate(p.updatedAt))
    : ((p.data.floors?p.data.floors.length:0)+' 层 · '+formatDate(p.updatedAt));
  meta.appendChild(el('div',{class:'proj-sub'}, sub));
  card.appendChild(meta);

  const acts=el('div',{class:'proj-acts'});
  const renBtn=el('button',{class:'btn btn-mini'}, '重命名');
  renBtn.addEventListener('click',(e)=>{ e.stopPropagation(); startRename(p, card); });
  const delBtn=el('button',{class:'btn btn-mini btn-danger'}, '删除');
  delBtn.addEventListener('click', async (e)=>{ e.stopPropagation();
    const ok=await confirmDialog('确定删除「'+(p.title||'未命名小说')+'」？此操作不可撤销。');
    if(ok){ await idbDelete(p.id); state.projects=state.projects.filter(x=>x.id!==p.id); renderHome(); }
  });
  acts.appendChild(renBtn); acts.appendChild(delBtn);
  card.appendChild(acts);

  card.addEventListener('click', ()=> openProject(p.id));
  return card;
}

/**
 * 项目卡片封面占位内容。

 * - 论坛体项目：保持原逻辑，显示项目名。
 * 注：buildThumbChatPreview 函数保留，但不再用于项目卡片封面占位。
 */
function buildThumbPlaceholder(p, isPickup){
  if(isPickup){
    return el('div',{class:'thumb-ph'}, p.title||'未命名捡手机');
  }
  return el('div',{class:'thumb-ph'}, p.title||'未命名小说');

/** 渲染微信风 mini 对话气泡缩略图（左头像 + 右气泡，取最后一条消息）。
 *  昵称显示规则：群聊（type==='group'）在头像右侧、气泡上方显示发送者昵称；
 *  单聊（type==='single'）头像旁不显示昵称（昵称仅在顶部 tcp-head 显示）。 */
function buildThumbChatPreview(chat){
  const ph=el('div',{class:'thumb-ph thumb-chat-preview'});
  ph.appendChild(el('div',{class:'tcp-head'}, chatDisplayName(chat)));
  const row=el('div',{class:'tcp-row'});
  const avWrap=el('div',{class:'tcp-avatar'});
  const av=chatAvatar(chat);
  if(av && av.dataUrl) avWrap.appendChild(el('img',{class:'tcp-avatar-img', src:av.dataUrl, alt:''}));
  else avWrap.appendChild(el('span',{class:'tcp-avatar-ph'}, chatAvatarText(chat)));
  row.appendChild(avWrap);

  const last=lastMessage(chat);
  const wrap=el('div',{class:'tcp-bubble-wrap'});

  if(chat.type==='group'){
    // 群聊：头像与气泡之间插入发送者昵称（取最后一条消息 senderId 对应的成员名）
    const sender=last ? chat.members.find(m=>m.id===last.senderId) : null;
    const name=sender ? senderName(sender, sender.isMe) : (chat.name||'');
    if(name) wrap.appendChild(el('div',{class:'tcp-name'}, name));
  } else {
    // 单聊（chat.type==='single'）：头像旁不显示昵称，右侧直接是气泡
  }

  const bubble=el('div',{class:'tcp-bubble'});
  bubble.appendChild(el('span',{}, last?messageSnippet(last, chat):'（暂无消息）'));
  wrap.appendChild(bubble);
  row.appendChild(wrap);
  ph.appendChild(row);
  return ph;
}

function startRename(p, card){
  const titleEl=card.querySelector('.proj-title');
  const inp=el('input',{class:'inp inp-sm', value:p.title||''});
  titleEl.replaceWith(inp); inp.focus(); inp.select();
  const commit=async ()=>{
    const v=inp.value.trim()||'未命名小说';
    p.title=v; if(p.data && p.data.cover) p.data.cover.title=v; p.updatedAt=now();
    await idbPut(p);
    state.projects.sort((a,b)=>b.updatedAt-a.updatedAt);
    renderHome();
  };
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown',(e)=>{ if(e.key==='Enter') inp.blur(); else if(e.key==='Escape') renderHome(); });
}

async function openProject(id){
  let p=state.projects.find(x=>x.id===id);
  if(!p){ try{ p=await idbGet(id); }catch(e){ p=null; } }
  if(!p) return;
  state.currentProject=normalizeProject(p);
  const type = state.currentProject.type==='pickup' ? 'pickup' : 'forum';
  state.isEmbedded=false; state.view='editor'; state.mode='edit'; state.editorKind=type;
  if(type==='pickup'){
    state.pickupView='chatlist'; state.activeChatId=null;
    const d=state.currentProject.data;
    if(d.chats && d.chats[0]){ const me=d.chats[0].members.find(m=>m.isMe)||d.chats[0].members[0]; state.activeSenderId=me?me.id:null; }
    else state.activeSenderId=null;
  } else {
    state.pickupView='chatlist'; state.activeSenderId=null;
  }
  render();
}
async function goHome(){
  state.view='home'; state.currentProject=null;
  let fresh=[];
  try{ fresh=await idbGetAll(); }catch(e){ fresh=[]; }
  /* 合并内存中已存在但本次索引读回未包含的项目（如离线/file:// 下新建写入尚未被读回）。
     以 id 去重，索引读回优先；内存副本仅作为“新建未即时可见”时的兜底，避免列表刷新丢失。 */
  const byId=new Map();
  for(const p of fresh){ if(p && p.id) byId.set(p.id, p); }
  for(const p of (state.projects||[])){ if(p && p.id && !byId.has(p.id)) byId.set(p.id, p); }
  state.projects=Array.from(byId.values());
  state.projects.sort((a,b)=>b.updatedAt-a.updatedAt);
  render();
}

/* 导入说明弹窗：先提示格式要求，用户点「选择文件」后再真正触发文件选择。 */
function openImportHelp(){
  const body=el('div',{class:'modal-body'});
  body.appendChild(el('h3',{}, '导入作品'));
  body.appendChild(el('p',{}, '请上传由本编辑器导出的 .json 项目文件。文件需包含项目数据、角色、聊天记录等，格式不正确可能导致导入失败。'));
  const row=el('div',{class:'modal-row modal-actions'});
  const cancel=el('button',{class:'btn btn-ghost'}, '取消');
  const pick=el('button',{class:'btn btn-primary'}, '选择文件');
  row.appendChild(cancel); row.appendChild(pick);
  body.appendChild(row);
  const closeFn=openModal(body);
  cancel.addEventListener('click', ()=> closeFn());
  pick.addEventListener('click', ()=>{ closeFn(); doPickFile(); });
}

/* 创建隐藏 file input 并触发文件选择，解析后写入本地库。 */
function doPickFile(){
  const inp=el('input',{type:'file', accept:'.json,application/json', style:'display:none'});
  document.body.appendChild(inp);
  inp.addEventListener('change', async ()=>{
    try{
      const text=await inp.files[0].text();
      const proj=deserialize(text);
      const norm=normalizeProject(proj);
      norm.id=uid(); norm.createdAt=now(); norm.updatedAt=now();
      await idbPut(norm);
      state.projects.push(norm); state.projects.sort((a,b)=>b.updatedAt-a.updatedAt);
      renderHome();
    }catch(err){ alert('导入失败：'+err.message); }
    inp.remove();
  });
  inp.click();
}

/* ---------- 编辑器外壳 ---------- */
function renderEditor(){
  const app=document.getElementById('app'); app.innerHTML=''; app.classList.add('editor-view');
  const p=state.currentProject;

  const bar=el('div',{class:'topbar'});
  const back=el('button',{class:'btn btn-ghost'}, iconSvg('back'), ' 返回列表');
  back.addEventListener('click', goHome);
  const titleWrap=el('div',{class:'title-edit'});
  const titleBtn=el('div',{class:'title-btn'}, p.title);
  titleBtn.addEventListener('click', ()=> startTitleEdit(titleBtn));
  titleWrap.appendChild(titleBtn);

  const setBtn=el('button',{class:'btn btn-ghost'}, '设置');
  setBtn.addEventListener('click',()=>{
    const box=document.querySelector('.settings');
    if(box){ const open=box.classList.toggle('open'); setBtn.classList.toggle('is-on', open); }
    setTimeout(()=> document.addEventListener('click', closeSettingsOnce, {once:true}), 0);
  });
  function closeSettingsOnce(e){
    const box=document.querySelector('.settings');
    if(!box || !box.classList.contains('open')) return;
    if(box.contains(e.target)) return;
    if(e.target===setBtn || setBtn.contains(e.target)) return;
    box.classList.remove('open'); setBtn.classList.remove('is-on');
  }

  const toggle=el('div',{class:'seg'});
  const editBtn=el('button',{class:'seg-btn'+(state.mode==='edit'?' active':'')}, '编辑');
  const prevBtn=el('button',{class:'seg-btn'+(state.mode==='preview'?' active':'')}, '预览');
  editBtn.addEventListener('click',()=>{ if(state.mode!=='edit'){ state.mode='edit'; applyModeVisibility(); updateSeg(); } });
  prevBtn.addEventListener('click',()=>{ if(state.mode!=='preview'){ state.mode='preview'; applyModeVisibility(); updateSeg(); } });
  toggle.appendChild(editBtn); toggle.appendChild(prevBtn);

  const exportBtn=el('button',{class:'btn btn-ghost'}, '导出 ▾');
  exportBtn.addEventListener('click',(e)=> toggleExportMenu(e.currentTarget));

  bar.appendChild(back); bar.appendChild(titleWrap); bar.appendChild(toggle); bar.appendChild(setBtn); bar.appendChild(exportBtn);
  bar.appendChild(buildAccountBtn({id:'editor-account-btn'}));
  bar.appendChild(buildSettings());
  app.appendChild(bar);

  const content=el('div',{id:'editor-content', class:'editor-content'});
  app.appendChild(content);
  renderEditorContent();
}
function updateSeg(){
  const btns=document.querySelectorAll('.seg-btn');
  btns.forEach(b=>b.classList.remove('active'));
  btns[state.mode==='edit'?0:1].classList.add('active');
}
function startTitleEdit(titleBtn){
  const cur=state.currentProject.title;
  const inp=el('input',{class:'title-input', value:cur});
  titleBtn.replaceWith(inp); inp.focus(); inp.select();
  const commit=()=>{
    const v=inp.value.trim()||'未命名小说';
    state.currentProject.title=v; state.currentProject.data.cover.title=v; scheduleSave(); renderEditor();
  };
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown',(e)=>{ if(e.key==='Enter') inp.blur(); else if(e.key==='Escape') renderEditor(); });
}

/* ---------- 设置 ---------- */
function buildSettings(){
  const data=state.currentProject.data; const s=data.settings;
  const box=el('div',{class:'settings'});

  const body=el('div',{class:'settings-body'});
  const row1=el('label',{class:'set-row'});
  row1.appendChild(el('span',{}, '显示发帖时间'));
  const sw=el('input',{type:'checkbox'});
  if(s.showTime) sw.checked=true;
  sw.addEventListener('change',()=>{ s.showTime=sw.checked; renderEditorContent(); scheduleSave(); });
  row1.appendChild(sw);
  body.appendChild(row1);

  const row2=el('label',{class:'set-row'});
  row2.appendChild(el('span',{}, '长图分页比例'));
  const sel=el('select',{class:'inp inp-sm'});
  [['9:16','9:16（默认）'],['3:4','3:4'],['custom','自定义高度']].forEach(([v,t])=>{
    const o=el('option',{value:v}, t); if(s.pageRatio===v) o.selected=true; sel.appendChild(o); });
  sel.addEventListener('change',()=>{ s.pageRatio=sel.value; customWrap.style.display=s.pageRatio==='custom'?'flex':'none'; scheduleSave(); });
  row2.appendChild(sel);
  body.appendChild(row2);

  const customWrap=el('label',{class:'set-row'});
  customWrap.appendChild(el('span',{}, '自定义高度(px)'));
  const ch=el('input',{class:'inp inp-sm', type:'number', min:'100', placeholder:'如 800'});
  if(s.pageHeightPx!=null) ch.value=s.pageHeightPx;
  ch.addEventListener('input',()=>{ s.pageHeightPx=ch.value?parseInt(ch.value,10):null; scheduleSave(); });
  customWrap.appendChild(ch);
  customWrap.style.display=s.pageRatio==='custom'?'flex':'none';
  body.appendChild(customWrap);

  /* 项目封面图（统一封面策略：项目级 coverImage 优先） */
  const row3=el('label',{class:'set-row'});
  row3.appendChild(el('span',{}, '项目封面图'));
  const coverRight=el('div');
  if(data.coverImage && data.coverImage.dataUrl){
    coverRight.appendChild(el('img',{style:'height:32px;width:32px;object-fit:cover;border-radius:4px;margin-right:8px', src:data.coverImage.dataUrl, alt:''}));
    const delCover=el('button',{class:'btn btn-mini btn-danger', title:'删除'}, iconSvg('trash'));
    delCover.addEventListener('click',()=>{ data.coverImage=null; scheduleSave(); renderEditor(); });
    coverRight.appendChild(delCover);
  } else {
    const coverFile=el('input',{type:'file', accept:'image/*'});
    coverFile.addEventListener('change', async ()=>{
      const files=[...(coverFile.files||[])].filter(f=>f&&f.type&&f.type.startsWith('image/'));
      if(files.length){ const url=await fileToDataURL(files[0]); data.coverImage={id:uid(), dataUrl:url, name:files[0].name||'cover'}; coverFile.value=''; scheduleSave(); renderEditor(); }
    });
    const uploadRow = el('div',{class:'cover-upload-row'});
    const uploadBtn = el('button',{class:'cover-upload-btn', title:'上传封面图', type:'button'}, iconSvg('upload'));
    uploadBtn.addEventListener('click', ()=> coverFile.click());
    uploadRow.appendChild(el('span',{}, '上传封面图'));
    uploadRow.appendChild(uploadBtn);
    uploadRow.appendChild(coverFile);
    coverRight.appendChild(uploadRow);
  }
  row3.appendChild(coverRight);
  body.appendChild(row3);

  box.appendChild(body);
  return box;
}

/* ---------- 内容区（编辑 / 预览） ---------- */
function renderEditorContent(){
  const root=document.getElementById('editor-content'); if(!root) return;
  root.innerHTML='';
  const body=el('div',{class:'editor-body'});
  const editCol=el('div',{class:'col-edit'});
  const previewCol=el('div',{class:'col-preview'});
  const divider=el('div',{class:'col-divider', 'aria-hidden':'true'});
  editCol.appendChild(buildEditorEdit());
  previewCol.appendChild(buildPreview());
  body.appendChild(editCol); body.appendChild(divider); body.appendChild(previewCol);
  root.appendChild(body);
  applyModeVisibility();
}
function buildEditorContentRefresh(){ renderEditorContent(); }

/* 实时预览刷新（仅重渲染预览列，避免编辑区失焦） */
let previewRefreshTimer=null;
function schedulePreviewRefresh(){
  if(previewRefreshTimer) clearTimeout(previewRefreshTimer);
  previewRefreshTimer=setTimeout(()=>{
    const pc=document.querySelector('.col-preview'); if(!pc) return;
    pc.innerHTML=''; pc.appendChild(buildPreview());
  }, 180);
}

/* 双栏 / 单栏可见性控制 */
function applyModeVisibility(){
  const body=document.querySelector('.editor-body'); if(!body) return;
  const editCol=body.querySelector('.col-edit');
  const prevCol=body.querySelector('.col-preview');
  const divider=body.querySelector('.col-divider');
  const seg=document.querySelector('.topbar .seg');
  if(!editCol || !prevCol) return;
  const showDivider=()=>{ if(divider) divider.style.display=''; };
  const hideDivider=()=>{ if(divider) divider.style.display='none'; };
  if(state.previewOnly){
    editCol.style.display = state.mode==='edit' ? '' : 'none';
    prevCol.style.display = state.mode==='preview' ? '' : 'none';
    hideDivider();
    if(seg) seg.style.display='';
    return;
  }
  const wide = window.matchMedia && window.matchMedia('(min-width:1024px)').matches;
  if(wide){
    editCol.style.display=''; prevCol.style.display=''; showDivider();
  } else {
    editCol.style.display = state.mode==='edit' ? '' : 'none';
    prevCol.style.display = state.mode==='preview' ? '' : 'none';
    hideDivider();
  }
  if(seg) seg.style.display = wide ? 'none' : '';
}

/* 文本框自动增高 */
function autoGrow(ta){
  ta.style.height='auto';
  ta.style.height=(ta.scrollHeight)+'px';
}

/* 编辑模式 */
function buildEditorEdit(){
  const data=state.currentProject.data; const showTime=data.settings.showTime;
  const wrap=el('div',{class:'edit-wrap'});

  const coverBlock=el('div',{class:'edit-block'});

  /* 封面顶部：标签 + 圆 + 楼主 id 同行（编辑区） */
  const coverTop=el('div',{class:'cover-top'});
  coverTop.appendChild(el('span',{class:'cover-label'}, '楼主帖（封面）'));
  const coverCircleWrap=el('div',{class:'cover-circle-wrap'});
  const coverCircle=el('div',{class:'cover-circle'});
  function renderCoverCircle(){
    coverCircle.innerHTML='';
    if(data.cover.avatar && data.cover.avatar.dataUrl){
      coverCircle.appendChild(el('img',{class:'cover-circle-img', src:data.cover.avatar.dataUrl, alt:''}));
      const delBtn=el('button',{class:'cover-circle-del', title:'删除头像'}, '×');
      delBtn.addEventListener('click',(e)=>{ e.stopPropagation(); data.cover.avatar=null; buildEditorContentRefresh(); scheduleSave(); });
      coverCircleWrap.appendChild(delBtn);
    } else {
      coverCircle.appendChild(el('span',{class:'cover-circle-plus icon-lg'}, iconSvg('plus')));
    }
  }
  renderCoverCircle();
  coverCircleWrap.appendChild(coverCircle);
  const avatarFileInput=el('input',{type:'file', accept:'image/*', style:'display:none'});
  avatarFileInput.addEventListener('change', async ()=>{
    const files=[...(avatarFileInput.files||[])].filter(f=>f&&f.type&&f.type.startsWith('image/'));
    if(files.length){ const url=await fileToDataURL(files[0]); data.cover.avatar={id:uid(), dataUrl:url, name:files[0].name||'avatar'}; avatarFileInput.value=''; buildEditorContentRefresh(); scheduleSave(); }
  });
  coverCircle.addEventListener('click',()=> avatarFileInput.click());
  coverTop.appendChild(coverCircleWrap);
  coverTop.appendChild(avatarFileInput);

  const idInput=el('input',{class:'inp', type:'text', value:data.cover.author||'', placeholder:'楼主 id（可空）'});
  idInput.addEventListener('input',()=>{ data.cover.author=idInput.value; scheduleSave(); schedulePreviewRefresh(); });
  coverTop.appendChild(idInput);
  coverTop.addEventListener('paste', async (e)=>{
    const items=e.clipboardData && e.clipboardData.items;
    if(!items) return;
    const files=[];
    for(const it of items){ if(it.type && it.type.startsWith('image/')){ const f=it.getAsFile(); if(f) files.push(f); } }
    if(files.length){ e.preventDefault(); const url=await fileToDataURL(files[0]); data.cover.avatar={id:uid(), dataUrl:url, name:'pasted-avatar'}; buildEditorContentRefresh(); scheduleSave(); }
  });
  coverBlock.appendChild(coverTop);
  const tInput=el('input',{class:'inp', type:'text', value:data.cover.title, placeholder:'标题'});
  tInput.addEventListener('input',()=>{ data.cover.title=tInput.value; state.currentProject.title=tInput.value.trim()||'未命名小说'; scheduleSave(); schedulePreviewRefresh(); });
  coverBlock.appendChild(tInput);
  const bTA=el('textarea',{class:'content-ta', placeholder:'正文…', rows:1}); bTA.value=data.cover.body;
  bTA.addEventListener('input',()=>{ data.cover.body=bTA.value; autoGrow(bTA); scheduleSave(); schedulePreviewRefresh(); });
  bTA.addEventListener('focus',()=> autoGrow(bTA));
  bTA.addEventListener('blur',()=>{ if(!bTA.value) bTA.style.height=''; });
  bTA.addEventListener('paste', makePasteHandler(data.cover.images, ()=>buildEditorContentRefresh()));
  coverBlock.appendChild(bTA);

  coverBlock.appendChild(buildImageArea(data.cover.images, ()=>buildEditorContentRefresh(), {addBtn:true}));
  wrap.appendChild(coverBlock);

  data.floors.forEach((f,i)=> wrap.appendChild(buildFloorEdit(f, i+1, data.floors, showTime)));

  const addBtn=el('button',{class:'btn btn-primary btn-block'}, iconSvg('plus'), ' 添加楼层');
  addBtn.addEventListener('click',()=>{ data.floors.push(newFloor()); buildEditorContentRefresh(); scheduleSave(); });
  wrap.appendChild(addBtn);
  return wrap;
}

function buildFloorEdit(floor, num, floors, showTime){
  const block=el('div',{class:'edit-block floor-card'});
  block.setAttribute('draggable','false');

  const op=el('div',{class:'floor-op'});
  const handle=el('div',{class:'drag-handle', title:'拖拽排序'}, '⋮⋮');
  handle.addEventListener('mousedown',()=> block.setAttribute('draggable','true'));
  handle.addEventListener('mouseup',()=> block.setAttribute('draggable','false'));
  const numEl=el('div',{class:'floor-num'}, '#'+num);
  const idInp=el('input',{class:'inp inp-sm id-inp', type:'text', placeholder:'id（可空）', value:floor.author});
  idInp.addEventListener('input',()=>{ floor.author=idInp.value; scheduleSave(); schedulePreviewRefresh(); });
  const fileInput=el('input',{type:'file', accept:'image/*', multiple:'true', style:'display:none'});
  fileInput.addEventListener('change', async ()=>{ if(fileInput.files.length){ await handleImageFiles(fileInput.files, floor.images); fileInput.value=''; buildEditorContentRefresh(); scheduleSave(); } });
  const imgBtn=el('button',{class:'btn btn-mini'}, '+图');
  imgBtn.addEventListener('click',()=> fileInput.click());
  const quoteOptions = [
    {value:'', label:'引用'},
    {value:'cover', label:'楼主帖'},
    ...floors.map((f,i)=>{ if(f.id===floor.id) return null; return {value:f.id, label:'#'+(i+1)}; }).filter(Boolean)
  ];
  const quoteLabel = (quoteOptions.find(o=>o.value===(floor.quote||'')) || quoteOptions[0]).label;
  const quoteBtn = el('button',{class:'btn btn-mini quote-dropdown-btn'}, quoteLabel, iconSvg('down'));
  const quoteMenu = el('div',{class:'quote-dropdown-menu', style:'display:none'});
  quoteOptions.forEach(o=>{
    const item = el('div',{class:'quote-dropdown-item'+(o.value===(floor.quote||'')?' active':'')}, o.label);
    item.addEventListener('click',()=>{ floor.quote=o.value||null; quoteMenu.style.display='none'; scheduleSave(); schedulePreviewRefresh(); });
    quoteMenu.appendChild(item);
  });
  quoteBtn.addEventListener('click', (e)=>{ e.stopPropagation(); quoteMenu.style.display = quoteMenu.style.display==='none'?'block':'none'; });
  const quoteDropdown = el('div',{class:'quote-dropdown'}, quoteBtn, quoteMenu);
  // 点击外部关闭
  const closeQuoteMenu = ()=>{ quoteMenu.style.display='none'; };
  document.addEventListener('click', (e)=>{ if(!quoteDropdown.contains(e.target)) closeQuoteMenu(); });
  quoteDropdown.addEventListener('click', (e)=> e.stopPropagation());
  const opToggle=el('button',{class:'btn btn-mini op-toggle'+(floor.isOP?' active':''), title:'标记为楼主帖'}, '楼主');
  opToggle.addEventListener('click',()=>{ floor.isOP=!floor.isOP; opToggle.classList.toggle('active', floor.isOP); scheduleSave(); schedulePreviewRefresh(); });
  const up=el('button',{class:'btn btn-mini'}, iconSvg('up')); up.addEventListener('click',()=>moveFloor(floor.id,'up'));
  const down=el('button',{class:'btn btn-mini'}, iconSvg('down')); down.addEventListener('click',()=>moveFloor(floor.id,'down'));
  const del=el('button',{class:'btn btn-mini btn-danger', title:'删除'}, iconSvg('trash'));
  del.addEventListener('click',()=>{ const i=floors.findIndex(x=>x.id===floor.id); if(i>=0){ floors.splice(i,1); buildEditorContentRefresh(); scheduleSave(); } });
  op.appendChild(handle); op.appendChild(numEl); op.appendChild(idInp); op.appendChild(imgBtn); op.appendChild(fileInput); op.appendChild(quoteDropdown); op.appendChild(opToggle); op.appendChild(up); op.appendChild(down); op.appendChild(del);
  block.appendChild(op);

  if(showTime){
    const time=el('input',{class:'inp inp-sm', type:'datetime-local', value:floor.time||''});
    time.addEventListener('input',()=>{ floor.time=time.value; scheduleSave(); schedulePreviewRefresh(); });
    block.appendChild(time);
  }

  const content=el('textarea',{class:'content-ta', placeholder:'回复内容…', rows:1}); content.value=floor.content;
  content.addEventListener('input',()=>{ floor.content=content.value; autoGrow(content); scheduleSave(); schedulePreviewRefresh(); });
  content.addEventListener('focus',()=> autoGrow(content));
  content.addEventListener('blur',()=>{ if(!content.value) content.style.height=''; });
  content.addEventListener('paste', makePasteHandler(floor.images, ()=>buildEditorContentRefresh()));
  block.appendChild(content);

  block.appendChild(buildImageArea(floor.images, ()=>buildEditorContentRefresh(), {addBtn:false}));

  /* HTML5 拖拽排序（桌面端） */
  block.addEventListener('dragstart',(e)=>{ e.dataTransfer.setData('text/plain', floor.id); e.dataTransfer.effectAllowed='move'; block.classList.add('dragging'); });
  block.addEventListener('dragend',()=>{ block.setAttribute('draggable','false'); block.classList.remove('dragging');
    document.querySelectorAll('.floor-card.over').forEach(c=>c.classList.remove('over')); });
  block.addEventListener('dragover',(e)=>{ e.preventDefault(); block.classList.add('over'); });
  block.addEventListener('dragleave',()=> block.classList.remove('over'));
  block.addEventListener('drop',(e)=>{ e.preventDefault(); block.classList.remove('over');
    const fromId=e.dataTransfer.getData('text/plain'); if(fromId && fromId!==floor.id) reorderFloor(fromId, floor.id); });
  return block;
}

function buildImageArea(images, onChange, opts){
  opts=opts||{};
  const area=el('div',{class:'img-area'});
  const grid=el('div',{class:'img-grid'});
  images.forEach((im,idx)=>{
    const cell=el('div',{class:'img-cell'});
    cell.appendChild(el('img',{class:'img-thumb', src:im.dataUrl, alt:im.name||''}));
    const del=el('button',{class:'img-del', title:'删除'}, '×');
    del.addEventListener('click',()=>{ images.splice(idx,1); onChange(); });
    cell.appendChild(del);
    grid.appendChild(cell);
  });
  area.appendChild(grid);
  if(opts.addBtn){
    const fileInput=el('input',{type:'file', accept:'image/*', multiple:'true', style:'display:none'});
    fileInput.addEventListener('change', async ()=>{ if(fileInput.files.length){ await handleImageFiles(fileInput.files, images); fileInput.value=''; onChange(); } });
    const addBtn=el('button',{class:'btn btn-ghost btn-mini'}, iconSvg('plus'), ' 图片');
    addBtn.addEventListener('click',()=> fileInput.click());
    area.appendChild(addBtn);
    area.appendChild(fileInput);
    area.addEventListener('paste', makePasteHandler(images, onChange));
  }
  return area;
}

function reorderFloor(fromId, toId){
  const floors=state.currentProject.data.floors;
  const from=floors.findIndex(f=>f.id===fromId); const to=floors.findIndex(f=>f.id===toId);
  if(from<0||to<0) return;
  const [m]=floors.splice(from,1); floors.splice(to,0,m);
  buildEditorContentRefresh(); scheduleSave();
}
function moveFloor(id, dir){
  const floors=state.currentProject.data.floors; const i=floors.findIndex(f=>f.id===id);
  if(i<0) return; const j=dir==='up'?i-1:i+1; if(j<0||j>=floors.length) return;
  const t=floors[i]; floors[i]=floors[j]; floors[j]=t;
  buildEditorContentRefresh(); scheduleSave();
}

/* 预览模式（= 成品观感 = 长图/HTML 渲染基准） */
function buildPreview(){
  const data=state.currentProject.data; const showTime=data.settings.showTime;
  const frame=el('div',{class:'phone-frame'});
  const feed=el('div',{class:'feed'});
  const blocks=[ buildCoverPreview(data.cover) ];
  data.floors.forEach((f,i)=> blocks.push(buildFloorPreview(f, i+1, data.floors, data.cover, showTime)));
  blocks.forEach((b,idx)=>{ feed.appendChild(b); if(idx<blocks.length-1) feed.appendChild(el('hr',{class:'pv-hr'})); });
  frame.appendChild(feed);
  return frame;
}
function buildCoverPreview(cover){
  const wrap=el('div',{class:'pv-cover'});
  if(cover.title) wrap.appendChild(el('div',{class:'pv-cover-title'}, cover.title));
  if((cover.avatar && cover.avatar.dataUrl) || cover.author){
    const head=el('div',{class:'pv-cover-head'});
    if(cover.avatar && cover.avatar.dataUrl){

/* ---------- 导出：长图（手写 canvas） ---------- */
const PAGE_W=420, PAGE_PAD=16, GAP=16, DPR=2;
const CONTENT_W=PAGE_W-PAGE_PAD*2;
const FONT='"PingFang SC","Microsoft YaHei",system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif';
const TITLE_LH=30, BODY_LH=24, AUTHOR_LH=22, TIME_LH=16, QUOTE_LH=19, BLOCK_TOP=4;

function setFont(ctx, size, weight){ ctx.font=`${weight} ${size}px ${FONT}`; }
function wrapText(ctx, text, maxW){
  const out=[]; const paras=String(text||'').split('\n');
  for(const para of paras){
    if(para===''){ out.push(''); continue; }
    let line='';
    for(const ch of para){
      const test=line+ch;
      if(ctx.measureText(test).width>maxW && line){ out.push(line); line=ch; }
      else line=test;
    }
    out.push(line);
  }
  return out;
}
function roundRect(ctx,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function drawImageFitWidth(ctx, img, x, y, maxW){
  const ratio=img.height/img.width; const w=maxW; const h=Math.round(w*ratio);
  ctx.drawImage(img, x, y, w, h); return h;
}
function collectImages(project){
  const list=[];
  const add=arr=>{ for(const im of (arr||[])) if(im && im.dataUrl) list.push(im); };
  if(project.type==='pickup'){
    const d=project.data||{};
    for(const chat of (d.chats||[])){
      for(const m of (chat.members||[])) if(m.avatar && m.avatar.dataUrl) add([m.avatar]);
      for(const msg of (chat.messages||[])) if(msg.image && msg.image.dataUrl) add([msg.image]);
    }
    return list;
  }
  const data=project.data;
  add(data.cover.images);
  if(data.cover.avatar && data.cover.avatar.dataUrl) add([data.cover.avatar]);
  for(const f of data.floors) add(f.images);
  return list;
}
function loadImages(images){
  return Promise.all(images.map(im=>new Promise(res=>{
    const img=new Image();
    img.onload=()=>res([im.id,img]); img.onerror=()=>res([im.id,null]); img.src=im.dataUrl;
  }))).then(entries=> new Map(entries.filter(e=>e[1])));
}

function prepareCover(cover, ctx, imageMap){
  setFont(ctx,20,700);
  const titleLines=cover.title?wrapText(ctx,cover.title,CONTENT_W):[];
  setFont(ctx,16,400);
  const bodyLines=cover.body?wrapText(ctx,cover.body,CONTENT_W):[];
  const imgInfos=(cover.images||[]).map(im=>({im, img:imageMap.get(im.id)}));
  const avatarImg = cover.avatar && imageMap.get(cover.avatar.id) ? imageMap.get(cover.avatar.id) : null;
  const AV=30;
  const hasHeader = !!avatarImg || !!cover.author;
  const headerH = hasHeader ? AV : 0;
  let contentH=0;
  contentH+=titleLines.length*TITLE_LH;
  if(titleLines.length && hasHeader) contentH+=8;
  if(hasHeader) contentH+=headerH;
  if((titleLines.length||hasHeader) && bodyLines.length) contentH+=8;
  contentH+=bodyLines.length*BODY_LH;
  imgInfos.forEach(info=>{ if(info.img) contentH+=8+Math.round(CONTENT_W*info.img.height/info.img.width); });
  const h=BLOCK_TOP+contentH;
  return { kind:'cover', height:h, titleLines, bodyLines, imgInfos, avatarImg, AV, hasHeader, separator:true,
    draw(ctx,x,y){
      let cy=y+BLOCK_TOP;
      /* 绘制顺序：标题 → 头像+楼主id → 正文 → 图片（与 DOM 预览一致） */
      setFont(ctx,20,700); ctx.fillStyle='#1f2329'; ctx.textBaseline='middle'; ctx.textAlign='left';
      titleLines.forEach(line=>{ ctx.fillText(line, x, cy+TITLE_LH/2); cy+=TITLE_LH; });
      if(titleLines.length && this.hasHeader) cy+=8;
      if(this.hasHeader){
        const ax=x, ay=cy, av=this.AV;
        if(this.avatarImg){
          ctx.save();
          ctx.beginPath(); ctx.arc(ax+av/2, ay+av/2, av/2, 0, Math.PI*2); ctx.closePath(); ctx.clip();
          ctx.drawImage(this.avatarImg, ax, ay, av, av); ctx.restore();
          ctx.strokeStyle='#e5e6eb'; ctx.lineWidth=1;
          ctx.beginPath(); ctx.arc(ax+av/2, ay+av/2, av/2, 0, Math.PI*2); ctx.stroke();
        }
        if(cover.author){
          setFont(ctx,15,500); ctx.fillStyle='#333'; ctx.textBaseline='middle'; ctx.textAlign='left';
          const tx = this.avatarImg ? ax+av+8 : x;
          ctx.fillText(cover.author, tx, ay+av/2);
        }
        cy += this.AV + (bodyLines.length ? 8 : 0);
      }
      setFont(ctx,16,400); ctx.fillStyle='#333';
      bodyLines.forEach(line=>{ ctx.fillText(line, x, cy+BODY_LH/2); cy+=BODY_LH; });
      imgInfos.forEach(info=>{ if(info.img){ const iw=CONTENT_W; const ih=Math.round(CONTENT_W*info.img.height/info.img.width);
        cy+=8; roundRect(ctx,x,cy,iw,ih,10); ctx.save(); ctx.clip(); drawImageFitWidth(ctx, info.img, x, cy, iw); ctx.restore(); cy+=ih; } });
      if(this.separator!==false){ ctx.strokeStyle='#e5e6eb'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(x, y+h+GAP/2); ctx.lineTo(x+CONTENT_W, y+h+GAP/2); ctx.stroke(); }
    }
  };
}

function prepareFloor(floor, num, floors, cover, ctx, imageMap, showTime){
  const bodyW=CONTENT_W;
  const resolved=resolveQuote(floor, floors, cover);
  let quote=null;
  if(resolved.found && floor.quote){
    const label = resolved.type==='cover' ? '引用 楼主帖：' : `引用 @${resolved.author||'匿名用户'} (#${resolved.floorNumber})：`;
    setFont(ctx,13,400);
    const raw=(resolved.content||'').replace(/\n/g,' ');
    const summary=raw.slice(0,50)+(raw.length>50?'…':'');
    const sumLines=wrapText(ctx, label+summary, bodyW);
    quote={ sumLines, h:sumLines.length*QUOTE_LH+16 };
  }
  setFont(ctx,16,400);
  const bodyLines=floor.content?wrapText(ctx, floor.content, bodyW):[];
  const imgInfos=(floor.images||[]).map(im=>({im, img:imageMap.get(im.id)}));
  const headerH=AUTHOR_LH;
  let contentH=headerH+6;
  if(quote) contentH+=quote.h+8;
  contentH+=bodyLines.length*BODY_LH;
  imgInfos.forEach(info=>{ if(info.img) contentH+=8+Math.round(bodyW*info.img.height/info.img.width); });
  const h=BLOCK_TOP+contentH;
  return { kind:'floor', height:h, floor, num, bodyW, quote, bodyLines, imgInfos, headerH, separator:true,
    draw(ctx,x,y){
      let cy=y+BLOCK_TOP;
      let curX=x;
      const numText='#'+num;
      setFont(ctx,15,700); ctx.fillStyle='#646a73'; ctx.textBaseline='middle'; ctx.textAlign='left';
      ctx.fillText(numText, curX, cy+headerH/2);
      curX += ctx.measureText(numText).width + 6;
      if(floor.author){ setFont(ctx,14,500); ctx.fillStyle='#333'; ctx.fillText(floor.author, curX, cy+headerH/2); curX += ctx.measureText(floor.author).width + 6; }
      if(floor.isOP){
        setFont(ctx,12,500); const tagText='楼主'; const tw=ctx.measureText(tagText).width;
        const tagW=tw+12, tagH=18, tagY=cy+(headerH-tagH)/2;
        roundRect(ctx, curX, tagY, tagW, tagH, 9); ctx.fillStyle='#f2f3f5'; ctx.fill();
        ctx.fillStyle='#646a73'; ctx.textBaseline='middle'; ctx.textAlign='left';
        ctx.fillText(tagText, curX+6, tagY+tagH/2); curX += tagW + 6;
      }
      if(showTime && floor.time){ setFont(ctx,12,400); ctx.fillStyle='#a0a6ad'; ctx.textAlign='right';
        ctx.fillText(formatTime(floor.time), x+CONTENT_W, cy+headerH/2); ctx.textAlign='left'; }
      cy+=headerH+6;
      if(quote){
        const qx=x, qy=cy, qw=bodyW, qh=quote.h;
        roundRect(ctx,qx,qy,qw,qh,6); ctx.fillStyle='#f6f7f9'; ctx.fill();
        setFont(ctx,13,400); ctx.fillStyle='#7a818a'; ctx.textBaseline='middle';
        let qy2=qy+8+QUOTE_LH/2;
        quote.sumLines.forEach(line=>{ ctx.fillText(line, qx+10, qy2); qy2+=QUOTE_LH; });
        cy+=qh+8;
      }
      setFont(ctx,16,400); ctx.fillStyle='#333'; ctx.textBaseline='middle';
      bodyLines.forEach(line=>{ ctx.fillText(line, x, cy+BODY_LH/2); cy+=BODY_LH; });
      imgInfos.forEach(info=>{ if(info.img){ const iw=bodyW; const ih=Math.round(bodyW*info.img.height/info.img.width);
        cy+=8; roundRect(ctx,x,cy,iw,ih,10); ctx.save(); ctx.clip(); drawImageFitWidth(ctx, info.img, x, cy, iw); ctx.restore(); cy+=ih; } });
      if(this.separator!==false){ ctx.strokeStyle='#e5e6eb'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(x, y+h+GAP/2); ctx.lineTo(x+CONTENT_W, y+h+GAP/2); ctx.stroke(); }
    }
  };
}

async function renderLongImage(pageH){
  const data=state.currentProject.data;
  const imageMap=await loadImages(collectImages(state.currentProject));
  const mctx=document.createElement('canvas').getContext('2d');

  /* 把一页 blocks 渲染成一张 canvas，返回 dataURL（供封面页与楼层页复用） */
  function renderPageCanvas(blocks, pageH){
    let used=PAGE_PAD*2; blocks.forEach(b=> used+=b.height+GAP); used-=GAP;
    const canvasH=Math.max(pageH, used);
    const canvas=document.createElement('canvas');
    canvas.width=PAGE_W*DPR; canvas.height=canvasH*DPR;
    const ctx=canvas.getContext('2d'); ctx.scale(DPR,DPR);
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,PAGE_W,canvasH);
    let y=PAGE_PAD;
    blocks.forEach((b,i)=>{ b.separator=(i<blocks.length-1); b.draw(ctx, PAGE_PAD, y); y+=b.height+GAP; });
    return canvas.toDataURL('image/png');
  }

  const pages=[];
  /* ① 封面强制独占第 1 页（无论封面多短，且封面上不画与下页的分隔线） */
  pages.push(renderPageCanvas([ prepareCover(data.cover, mctx, imageMap) ], pageH));
  /* ② 楼层经 splitPages 得到第 2..N 页，每页同样用 pageH */
  const floorBlocks=data.floors.map((f,i)=> prepareFloor(f, i+1, data.floors, data.cover, mctx, imageMap, data.settings.showTime));
  const floorPages=splitPages(floorBlocks, pageH, b=>b.height);
  floorPages.forEach(page=> pages.push(renderPageCanvas(page, pageH)));
  return pages;
}

function openLongImageModal(){
  if(state.currentProject.type==='pickup'){ openLongImageModalPickup(); return; }
  const s=state.currentProject.data.settings;
  const body=el('div',{class:'modal-body'});

  const ratioRow=el('div',{class:'modal-row'});

  [['9:16','9:16（默认）'],['3:4','3:4'],['custom','自定义高度']].forEach(([v,t])=>{
    const o=el('option',{value:v}, t); if(s.pageRatio===v) o.selected=true; sel.appendChild(o); });
  ratioRow.appendChild(el('label',{}, '比例'));
  ratioRow.appendChild(sel);
  const genBtn=el('button',{class:'btn btn-primary', style:'margin-left:auto'}, '生成长图');
  ratioRow.appendChild(genBtn);
  body.appendChild(ratioRow);

  const customRow=el('div',{class:'modal-row'});
  const ch=el('input',{class:'inp', type:'number', min:'100', placeholder:'px'}); if(s.pageHeightPx!=null) ch.value=s.pageHeightPx;
  customRow.appendChild(el('label',{}, '高度(px)'));
  customRow.appendChild(ch);
  customRow.style.display=s.pageRatio==='custom'?'flex':'none';
  body.appendChild(customRow);
  sel.addEventListener('change',()=>{ customRow.style.display=sel.value==='custom'?'flex':'none'; });

  const results=el('div',{class:'long-results'});
  body.appendChild(results);

  genBtn.addEventListener('click', async ()=>{
    let pageH;
    if(sel.value==='9:16') pageH=Math.round(PAGE_W*16/9);
    else if(sel.value==='3:4') pageH=Math.round(PAGE_W*4/3);
    else pageH=Math.max(100, parseInt(ch.value,10)||747);
    genBtn.disabled=true; genBtn.textContent='生成中…';
    try{
      const pages=await renderLongImage(pageH);
      results.innerHTML='';
      if(pages.length===0){ results.appendChild(el('div',{}, '暂无内容')); }
      pages.forEach((url,i)=>{
        const pc=el('div',{class:'page-card'});
        pc.appendChild(el('img',{class:'page-thumb', src:url}));
        pc.appendChild(el('div',{class:'page-no'}, '第 '+(i+1)+' 页'));
        const dl=el('button',{class:'btn btn-ghost btn-sm'}, '下载本页');
        dl.addEventListener('click',()=> downloadDataUrl(safeName(state.currentProject.title)+'-'+(i+1)+'.png', url));
        pc.appendChild(dl);
        results.appendChild(pc);
      });
      if(pages.length>1){
        const all=el('button',{class:'btn btn-primary btn-block'}, '下载全部');
        all.addEventListener('click', async ()=>{ for(let i=0;i<pages.length;i++){ await downloadDataUrl(safeName(state.currentProject.title)+'-'+(i+1)+'.png', pages[i]); await new Promise(r=>setTimeout(r,400)); } });
        results.appendChild(all);
      }
    }catch(err){ alert('生成长图失败：'+err.message); }
    finally{ genBtn.disabled=false; genBtn.textContent='生成长图'; }
  });
  openModal(body);
}

/* ---------- 弹窗 / 确认 ---------- */
function openModal(content, onClose, opts){
  opts=opts||{};
  const showClose = opts.showClose !== false; // 默认显示右上角 X 关闭按钮
  const root=document.getElementById('modal-root');
  const pickup = !!(state.currentProject && state.currentProject.type==='pickup');
  const backdrop=el('div',{class:'backdrop'});
  const modal=el('div',{class:'modal'+(pickup? ' wx-modal-pickup':'')});
  const closeFn=()=>{ backdrop.remove(); if(typeof onClose==='function') onClose(); };
  if(showClose){
    const close=el('button',{class:'modal-close'}, '×');
    modal.appendChild(close);
    close.addEventListener('click', closeFn);
  }
  modal.appendChild(content);
  backdrop.appendChild(modal); root.appendChild(backdrop);
  backdrop.addEventListener('click',(e)=>{ if(e.target===backdrop) closeFn(); });
  return closeFn;
}
function confirmDialog(message, okText){
  okText = okText || '删除';
  return new Promise(resolve=>{
    const body=el('div',{class:'modal-body'});
    body.appendChild(el('p',{}, message));
    const row=el('div',{class:'modal-row modal-actions'});
    const cancel=el('button',{class:'btn btn-ghost'}, '取消');
    const ok=el('button',{class:'btn btn-danger'}, okText);
    row.appendChild(cancel); row.appendChild(ok);
    body.appendChild(row);
    const closeFn=openModal(body);
    cancel.addEventListener('click',()=>{ closeFn(); resolve(false); });
    ok.addEventListener('click',()=>{ closeFn(); resolve(true); });
  });
}

/* ---------- 下载工具 ---------- */
function downloadBlob(filename, blob){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}
function downloadDataUrl(filename, dataUrl){
  const a=document.createElement('a'); a.href=dataUrl; a.download=filename;
  document.body.appendChild(a); a.click(); a.remove();
}

    /* 新建后立即加入内存列表：避免离线/file:// 下“返回首页”时 idbGetAll 尚未读回刚写入记录导致新建丢失 */
    if(!state.projects.some(x=>x.id===p.id)) state.projects.push(p);
    state.projects.sort((a,b)=>b.updatedAt-a.updatedAt);
    render();
  });
}

/* ---------- 路由外壳 ---------- */
function isDesktop(){ return window.innerWidth >= 760; }
function renderPickup(){
  const app=document.getElementById('app'); app.innerHTML=''; app.classList.add('editor-view');
  const p=state.currentProject;
  const bar=el('div',{class:'topbar'});
  const back=el('button',{class:'btn btn-ghost'}, iconSvg('back'), ' 返回列表');
  back.addEventListener('click', ()=>{
    if(isDesktop() || state.pickupView==='chatlist'){ goHome(); }
    else { state.pickupView='chatlist'; renderPickup(); }
  });
  const titleWrap=el('div',{class:'title-edit'});
  const titleBtn=el('div',{class:'title-btn'}, p.title);
  titleBtn.addEventListener('click', ()=> startTitleEditPickup(titleBtn));
  titleWrap.appendChild(titleBtn);
  const setBtn=el('button',{class:'btn btn-ghost'}, '设置');
  setBtn.addEventListener('click',()=>{
    const box=document.querySelector('.settings');
    if(box){ const open=box.classList.toggle('open'); setBtn.classList.toggle('is-on', open); }
    setTimeout(()=> document.addEventListener('click', closePickupSettingsOnce, {once:true}), 0);
  });
  function closePickupSettingsOnce(e){
    const box=document.querySelector('.settings');
    if(!box || !box.classList.contains('open')) return;
    if(box.contains(e.target)) return;
    if(e.target===setBtn || setBtn.contains(e.target)) return;
    box.classList.remove('open'); setBtn.classList.remove('is-on');
  }
  const exportBtn=el('button',{class:'btn btn-ghost'}, '导出 ▾');
  exportBtn.addEventListener('click',(e)=> toggleExportMenu(e.currentTarget));
  bar.appendChild(back); bar.appendChild(titleWrap); bar.appendChild(setBtn); bar.appendChild(exportBtn);
  bar.appendChild(buildPickupSettings());
  app.appendChild(bar);
  const content=el('div',{id:'wx-content', class:'wx-content'});
  app.appendChild(content);
  if(isDesktop()){ renderPickupDesktop(content); }
  else if(state.pickupView==='chatlist'){ renderChatList(content); }
  else { renderChatDetail(content); }
}

/* ---------- 聊天列表视图 ---------- */
function getActiveChat(){
  const d=state.currentProject && state.currentProject.data;
  if(!d) return null;
  return (d.chats||[]).find(c=>c.id===state.activeChatId)||null;
}
function buildChatListPanel(){
  const wrap=el('div',{class:'wx-chatlist'});
  const d=state.currentProject.data;
  const chats=[...(d.chats||[])].sort((a,b)=>a.order-b.order);
  if(chats.length===0) wrap.appendChild(el('div',{class:'empty'}, '还没有聊天，点“＋ 新建聊天”开始'));
  chats.forEach(c=> wrap.appendChild(buildChatItem(c)));
  return wrap;
}
function renderChatList(content){
  const shell=el('div',{class:'wx-shell'});
  const navbar=el('div',{class:'wx-navbar'});
  navbar.appendChild(el('div',{class:'wx-navbar-title'}, '聊天'));
  const newBtn=el('button',{class:'btn btn-mini btn-primary'}, '＋ 新建聊天');
  newBtn.addEventListener('click', ()=> createNewChat());
  navbar.appendChild(newBtn);
  shell.appendChild(navbar);
  shell.appendChild(buildChatListPanel());
  content.appendChild(shell);
}
function buildChatItem(chat){
  const item=el('div',{class:'wx-chatitem'+(chat.id===state.activeChatId?' active':'')});
  const avatarWrap=el('div',{class:'wx-avatar wx-avatar-sm'});
  const av=chatAvatar(chat);
  if(av && av.dataUrl) avatarWrap.appendChild(el('img',{class:'wx-avatar-img', src:av.dataUrl, alt:''}));
  else avatarWrap.appendChild(el('span',{class:'wx-avatar-ph'}, chatAvatarText(chat)));
  item.appendChild(avatarWrap);
  const main=el('div',{class:'wx-chatitem-main'});
  main.appendChild(el('div',{class:'wx-chatitem-name'}, chatDisplayName(chat)));
  const last=lastMessage(chat);
  const snip=last?messageSnippet(last, chat):'（暂无消息）';
  main.appendChild(el('div',{class:'wx-chatitem-snip'}, snip));
  item.appendChild(main);
  const right=el('div',{class:'wx-chatitem-right'});
  if(last && last.time) right.appendChild(el('div',{class:'wx-chatitem-time'}, shortTime(last.time)));

  delBtn.addEventListener('click', async (e)=>{ e.stopPropagation();

  });
  right.appendChild(delBtn);
  item.appendChild(right);
  item.addEventListener('click', ()=> openChat(chat.id));
  return item;
}
function openChat(chatId){
  state.activeChatId=chatId;
  const chat=getActiveChat();
  if(chat){ const me=chat.members.find(m=>m.isMe)||chat.members[0]; state.activeSenderId=me?me.id:null; }
  state.pickupView='chatdetail';
  renderPickup();
}
function createNewChat(){
  const d=state.currentProject.data; if(!d.chats) d.chats=[];
  const chat=newChat('新聊天');
  d.chats.push(chat);
  d.chats.forEach((c,i)=> c.order=i);
  scheduleSave();
  openChatInfo(chat, true);
}
function deleteChat(chat){
  const d=state.currentProject.data;
  d.chats=d.chats.filter(c=>c.id!==chat.id);
  if(state.activeChatId===chat.id){ state.activeChatId=null; state.pickupView='chatlist'; }
  scheduleSave();
  renderPickup();
}

/* ---------- 消息渲染（微信气泡 + 三角 + 头像 + 连续对齐） ---------- */
function buildMessageBubble(msg, ctx){
  const chat=ctx.chat; const readonly=ctx.readonly;
  const wrap=el('div',{class:'wx-msg-wrap'});
  if(msg.isSystem || msg.type==='system'){ wrap.appendChild(buildSystemLine(msg, chat)); return wrap; }
  const sender=chat.members.find(m=>m.id===msg.senderId)||null;
  const isMe=!!(sender&&sender.isMe);

  // 捡手机文学：自动时间戳已移除，仅保留手动添加的时间戳（kind='timestamp' 系统消息）。
  // 原自动渲染块：if(state.currentProject.data.settings.showTime && msg.time){ wrap.appendChild(el('div',{class:'wx-msg-time'}, shortTime(msg.time))); }
  // 注意：论坛体不调用 buildMessageBubble，故仅影响捡手机文学渲染；newMessage 的 time 字段保留不动。

  const row=el('div',{class:'wx-bubble-row '+(isMe?'me':'other')});
  const bubbleCol=el('div',{class:'wx-bubble-col'});
  if(chat.type==='group' && !isMe && sender){
    bubbleCol.appendChild(el('div',{class:'wx-name'}, sender.name||'成员'));
  }
  if(msg.quote && msg.quote.snippet){
    bubbleCol.appendChild(el('div',{class:'wx-quote'}, msg.quote.snippet));
  }
  const bubble=el('div',{class:'wx-bubble '+(isMe?'me':'other')+(msg.blocked?' blocked':'')+(msg.withdrawn?' withdrawn':'')});
  if(msg.type==='image'){
    if(msg.image && msg.image.dataUrl) bubble.appendChild(el('img',{class:'wx-bubble-img', src:msg.image.dataUrl, alt:msg.image.name||''}));
    if(msg.text) bubble.appendChild(el('div',{class:'wx-bubble-text'}, msg.text));
  } else if(msg.type==='voice'){
    bubble.appendChild(buildVoiceBubble(msg));
  } else {
    bubble.appendChild(el('div',{class:'wx-bubble-text'}, msg.text||''));
  }
  bubbleCol.appendChild(bubble);

  const avatar=el('div',{class:'wx-avatar'});
  if(sender && sender.avatar && sender.avatar.dataUrl) avatar.appendChild(el('img',{class:'wx-avatar-img', src:sender.avatar.dataUrl, alt:''}));
  else avatar.appendChild(el('span',{class:'wx-avatar-ph'}, (sender?(sender.name||'?'):'?').slice(0,1)));

  // 状态徽标（真实 DOM，避免伪元素定位错位）：拉黑红圆感叹号 / 撤回灰色标签
  let statusBadge=null;
  if(msg.blocked || msg.withdrawn){
    statusBadge=el('div',{class:'wx-status-badge'});
    if(msg.blocked) statusBadge.appendChild(el('div',{class:'wx-status-icon'}, '!'));
    if(msg.withdrawn) statusBadge.appendChild(el('div',{class:'wx-status-label'}, '已撤回'));
  }
  if(isMe){
    if(statusBadge) row.appendChild(statusBadge);
    row.appendChild(bubbleCol); row.appendChild(avatar);
  } else {
    row.appendChild(avatar); row.appendChild(bubbleCol);
    if(statusBadge) row.appendChild(statusBadge);
  }

  if(!readonly){
    row.addEventListener('contextmenu',(e)=>{ e.preventDefault(); ctx.onOp(msg); });
    attachLongPress(row, ()=> ctx.onOp(msg));
  }
  wrap.appendChild(row);
  if(msg.blocked){ wrap.appendChild(el('div',{class:'wx-rejected-tip'}, '消息已发出，但被对方拒收了')); }
  if(msg.withdrawn){ wrap.appendChild(buildSystemLine({kind:'withdraw', name:senderName(sender,isMe)}, chat)); }
  return wrap;
}
function buildVoiceBubble(msg){
  const v=msg.voice||{durationSec:1, transcript:''};
  const vb=el('div',{class:'wx-voice'});
  vb.appendChild(el('span',{class:'wx-voice-play', html:
    '<svg viewBox="0 0 1024 1024" fill="#333333" aria-hidden="true">'+
    '<path d="M636.16512 957.44l-70.80448-70.8096c107.59168-92.06272 176.03072-228.58752 176.03072-381.31712 0-145.49504-62.2848-276.1216-161.1776-367.77472L651.19232 66.56c117.01248 109.82912 190.51008 265.47712 190.51008 438.60992 0 180.44416-79.77984 341.90848-205.53728 452.27008z"/>'+
    '<path d="M445.08672 766.35648l-72.93952-72.92928c66.28352-36.64384 111.19104-107.16672 111.19104-188.25728 0-73.61536-37.04832-138.5216-93.47072-177.29024l71.62368-71.61344C535.72096 313.97376 583.68 403.88096 583.68 505.16992c0 108.65664-54.95808 204.44672-138.59328 261.18656zM253.96736 591.18592c-39.5776 0-71.66976-32.08192-71.66976-71.67488 0-39.59808 32.08704-71.67488 71.66976-71.67488 39.60832 0 71.68 32.0768 71.68 71.67488 0 39.59296-32.07168 71.67488-71.68 71.67488z"/>'+
    '</svg>'}));
  const wave=el('div',{class:'wx-wave'});
  const bars=Math.max(8, Math.min(26, Math.round((v.durationSec||1)*2.2)));
  for(let i=0;i<bars;i++) wave.appendChild(el('span',{class:'wx-wave-bar'}));
  vb.appendChild(wave);
  vb.appendChild(el('span',{class:'wx-voice-dur'}, (v.durationSec||0)+'\''));
  if(v.transcript){
    const tr=el('div',{class:'wx-voice-trans'}, v.transcript);
    tr.addEventListener('click',(e)=>{ e.stopPropagation(); editVoiceTranscript(msg); });
    vb.appendChild(tr);
  }
  return vb;
}
function buildSystemLine(msg, chat){
  let text='';
  if(msg.type==='system' && msg.nudge){ text=nudgeText(msg.nudge, chat); }
  else if(msg.kind==='withdraw'){ text=(msg.name||'对方')+' 撤回了一条消息'; }
  else if(msg.kind==='blocked'){ text='消息已发出，但被对方拒收了'; }
  else if(msg.kind==='nudge'){ text=nudgeText(msg.nudge, chat); }
  else if(msg.kind==='timestamp'){ text=msg.text||''; }
  return el('div',{class:'wx-sys'}, text);
}

/* ---------- 输入栏（发言人切换 + 图片 + 语音开关） ---------- */
function buildInputBar(chat){
  const wrap=el('div',{class:'wx-inputwrap'});
  const pending=el('div',{class:'wx-pending'});
  wrap.appendChild(pending);

  const bar=el('div',{class:'wx-inputbar'});
  const me=chat.members.find(m=>m.id===state.activeSenderId) || chat.members.find(m=>m.isMe) || chat.members[0];
  const idBtn=el('button',{class:'wx-idbtn'}, (me?me.name:'我')+' ▾');
  idBtn.addEventListener('click', (e)=> openIdentityPicker(e.currentTarget, chat));
  bar.appendChild(idBtn);

  const imgBtn=el('button',{class:'wx-imgbtn', title:'图片', html:
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'+
    '<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>'+
    '<circle cx="9" cy="9" r="2"/>'+
    '<path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>'});
  const imgInput=el('input',{type:'file', accept:'image/*', multiple:'true', style:'display:none'});
  imgInput.addEventListener('change', async ()=>{
    const files=[...(imgInput.files||[])].filter(f=>f&&f.type&&f.type.startsWith('image/'));
    if(files.length){ for(const f of files){ const du=await fileToDataURL(f); state.pendingImages.push({id:uid(), dataUrl:du, name:f.name||'image'}); } imgInput.value=''; updatePendingPreview(wrap); }
  });
  imgBtn.addEventListener('click', ()=> imgInput.click());
  bar.appendChild(imgBtn); bar.appendChild(imgInput);

  const voiceBtn=el('button',{class:'wx-voice-toggle'+(state.voiceOn?' is-on':''), title:'语音', html:
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'+
    '<path d="M12 14a4 4 0 0 0 4-4V6a4 4 0 0 0-8 0v4a4 4 0 0 0 4 4Z"/>'+
    '<path d="M19 11v-1a7 7 0 0 1-14 0v1"/>'+
    '<path d="M12 19v3"/>'+
    '<path d="M8 22h8"/></svg>'});
  voiceBtn.addEventListener('click', ()=>{ state.voiceOn=!state.voiceOn; voiceBtn.classList.toggle('is-on', state.voiceOn); });
  bar.appendChild(voiceBtn);

  const ta=el('textarea',{class:'wx-input', rows:1, placeholder:'说点什么…'});
  ta.addEventListener('input',()=> autoGrow(ta));
  ta.addEventListener('keydown',(e)=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendFromInput(chat, ta); } });
  ta.addEventListener('paste', makePasteHandler(state.pendingImages, ()=> updatePendingPreview(wrap)));
  bar.appendChild(ta);
  autoGrow(ta);

  const sendBtn=el('button',{class:'wx-sendbtn'}, '发送');
  sendBtn.addEventListener('click', ()=> sendFromInput(chat, ta));
  bar.appendChild(sendBtn);

  wrap.appendChild(bar);
  updatePendingPreview(wrap);
  return wrap;
}
function updatePendingPreview(wrap){
  const pending=wrap.querySelector('.wx-pending'); if(!pending) return; pending.innerHTML='';
  if(state.pendingQuote){
    const q=el('div',{class:'wx-pending-quote'}, '引用：'+(state.pendingQuote.snippet||''));
    const x=el('button',{class:'wx-pending-x'},'×'); x.addEventListener('click',()=>{ state.pendingQuote=null; updatePendingPreview(wrap); }); q.appendChild(x);
    pending.appendChild(q);
  }
  state.pendingImages.forEach((im,i)=>{
    const cell=el('div',{class:'wx-pending-img'});
    cell.appendChild(el('img',{src:im.dataUrl, alt:''}));
    const x=el('button',{class:'wx-pending-x'},'×'); x.addEventListener('click',()=>{ state.pendingImages.splice(i,1); updatePendingPreview(wrap); }); cell.appendChild(x);
    pending.appendChild(cell);
  });
}
function sendFromInput(chat, ta){
  const text=ta.value.trim();
  const rawImgs=state.pendingImages.slice();
  if(!text && rawImgs.length===0) return;
  const senderId=state.activeSenderId || (chat.members.find(m=>m.isMe)||chat.members[0]).id;
  const quote = state.pendingQuote ? {messageId:state.pendingQuote.messageId, snippet:state.pendingQuote.snippet} : null;
  if(state.voiceOn){
    openVoiceDurationPrompt((dur)=>{
      const m=newMessage({type:'voice', voice:{durationSec:dur, transcript:text}, senderId, quote});
      chat.messages.push(m);
      state.voiceOn=false;
      state.pendingImages=[]; state.pendingQuote=null; ta.value=''; ta.style.height='';
      afterMessageChange();
    });
    return;
  }
  (async ()=>{
    const imgs=[];
    for(const im of rawImgs){
      let url;
      try{ url=await compressDataUrl(im.dataUrl, im.name); }catch(e){ url=im.dataUrl; }
      imgs.push({id:uid(), dataUrl:url, name:im.name});
    }
    if(imgs.length){
      imgs.forEach((im,i)=>{
        chat.messages.push(newMessage({type:'image', image:im, text:(i===0?text:''), senderId, quote:(i===0?quote:null)}));
      });
    } else {
      chat.messages.push(newMessage({type:'text', text, senderId, quote}));
    }
    ta.value=''; ta.style.height='';
    state.pendingImages=[]; state.pendingQuote=null;
    afterMessageChange();
  })();
}
function openIdentityPicker(anchor, chat){
  const body=el('div',{class:'modal-body'});
  const isGroup=chat.members.length>=3;
  body.appendChild(el('h3',{}, isGroup?'作为谁说':'切换身份'));
  const list=el('div',{class:'wx-member-pop'});
  chat.members.forEach(m=>{
    const row=el('div',{class:'wx-member-row'+(m.id===state.activeSenderId?' active':'')});
    const av=el('div',{class:'wx-avatar wx-avatar-sm'});
    if(m.avatar&&m.avatar.dataUrl) av.appendChild(el('img',{class:'wx-avatar-img', src:m.avatar.dataUrl, alt:''}));
    else av.appendChild(el('span',{class:'wx-avatar-ph'}, (m.name||'?').slice(0,1)));
    row.appendChild(av);
    row.appendChild(el('span',{}, (m.name||'成员')+(m.isMe?'（我）':'')));
    row.addEventListener('click', ()=>{ closeFn(); state.activeSenderId=m.id; refreshChatDetail(); });
    list.appendChild(row);
  });
  body.appendChild(list);
  const closeFn=openModal(body);
}
function openVoiceDurationPrompt(cb){
  const body=el('div',{class:'modal-body'});
  body.appendChild(el('h3',{}, '语音时长'));

  }

  }
  if(msg.withdrawn){ add('恢复', ()=>{ msg.withdrawn=false; afterMessageChange(); }); }

  if(msg.type!=='system' && !msg.withdrawn && sender){
    const target=sender; const me=chat.members.find(m=>m.isMe)||chat.members[0];

  }

    const chat=getActiveChat();

/* ---------- 工具：压缩 / 长按 / 时间 / 展示名 ---------- */
function compressDataUrl(dataUrl, name){
  return new Promise((resolve)=>{
    const img=new Image();
    img.onload=()=>{
      let width=img.width, height=img.height; const max=1280;
      if(width>max||height>max){ const r=Math.min(max/width, max/height); width=Math.round(width*r); height=Math.round(height*r); }
      const c=document.createElement('canvas'); c.width=width; c.height=height;
      const ctx=c.getContext('2d'); ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,width,height); ctx.drawImage(img,0,0,width,height);
      try{ resolve(c.toDataURL('image/jpeg',0.85)); }catch(e){ resolve(dataUrl); }
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}
function attachLongPress(elem, cb){
  let timer=null, startX=0, startY=0;
  elem.addEventListener('touchstart',(e)=>{ const t=e.touches[0]; startX=t.clientX; startY=t.clientY; timer=setTimeout(()=>{ cb(); }, 500); }, {passive:true});
  elem.addEventListener('touchmove',(e)=>{ const t=e.touches[0]; if(Math.abs(t.clientX-startX)>10||Math.abs(t.clientY-startY)>10){ if(timer){clearTimeout(timer); timer=null;} } });
  elem.addEventListener('touchend',()=>{ if(timer){ clearTimeout(timer); timer=null; } });
  elem.addEventListener('touchcancel',()=>{ if(timer){ clearTimeout(timer); timer=null; } });
}
function shortTime(ts){
  const d=new Date(ts); const p=n=>String(n).padStart(2,'0'); const now=new Date();
  const sameDay=d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth()&&d.getDate()===now.getDate();
  if(sameDay) return p(d.getHours())+':'+p(d.getMinutes());
  return (d.getMonth()+1)+'/'+d.getDate()+' '+p(d.getHours())+':'+p(d.getMinutes());
}
function senderName(sender, isMe){ if(!sender) return '对方'; return isMe?'我':(sender.name||'对方'); }
function nudgeText(nudge, chat){
  if(!nudge) return '';
  const from=chat.members.find(m=>m.id===nudge.fromId);
  const to=chat.members.find(m=>m.id===nudge.toId);
  const fromName=from?(from.isMe?'你':(from.name||'对方')):'对方';
  const toName=to?(to.isMe?'你':(to.name||'对方')):'对方';
  return fromName+' 拍了拍 '+toName;
}
function chatAvatar(chat){
  if(!chat || !chat.members || !chat.members.length) return null;
  if(chat.type==='group') return null;
  const other=chat.members.find(m=>!m.isMe)||chat.members[0];
  return other.avatar||null;
}
function chatAvatarText(chat){
  if(!chat || !chat.members || !chat.members.length) return '群';
  if(chat.type==='group') return '群';
  const other=chat.members.find(m=>!m.isMe)||chat.members[0];
  return (other.name||'?').slice(0,1);
}
function chatDisplayName(chat){
  if(!chat) return '';
  if(chat.type==='group') return chat.name||'群聊';
  const other=chat.members.find(m=>!m.isMe)||chat.members[0];
  return other?(other.name||'对方'):'对方';
}
function lastMessage(chat){
  if(!chat || !chat.messages || !chat.messages.length) return null;
  return chat.messages[chat.messages.length-1];
}
function messageSnippet(msg, chat){
  if(msg.withdrawn) return '[撤回]';
  if(msg.type==='image') return '[图片]'+(msg.text?(' '+msg.text):'');
  if(msg.type==='voice') return '[语音]'+(msg.voice&&msg.voice.transcript?(' '+(msg.voice.transcript)):'');
  if(msg.type==='system') return nudgeText(msg.nudge, chat);
  return msg.text||'[消息]';
}

/* ---------- 长图导出：微信气泡绘制 + 手动分页 ---------- */
const WX_AV=36, WX_GAP=8, WX_PADY=8, WX_PADX=10, WX_BUBBLE_LH=20, WX_NAME_H=18, WX_QUOTE_LH=16, WX_VOICE_H=36;
function maxLineWidth(ctx, lines){ let m=0; for(const l of (lines||[])){ const w=ctx.measureText(l).width; if(w>m) m=w; } return m; }
function hashStr(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))>>>0; } return h; }
function drawAvatarWx(ctx, avatarImg, name, x, y, size){
  if(avatarImg){
    ctx.save(); ctx.beginPath(); ctx.arc(x+size/2, y+size/2, size/2, 0, Math.PI*2); ctx.closePath(); ctx.clip();
    ctx.drawImage(avatarImg, x, y, size, size); ctx.restore();
    ctx.strokeStyle='#e5e6eb'; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(x+size/2, y+size/2, size/2, 0, Math.PI*2); ctx.stroke();
  } else {
    ctx.fillStyle='#c8c9cc'; roundRect(ctx, x, y, size, size, 6); ctx.fill();
    setFont(ctx, 15, 500); ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText((name||'?').slice(0,1), x+size/2, y+size/2); ctx.textAlign='left';
  }
}
function prepareChatHeader(chat, ctx){
  const name=chatDisplayName(chat);
  setFont(ctx,16,600);
  const h=BLOCK_TOP+30;
  return { kind:'header', height:h, separator:false,
    draw(ctx,x,y){ setFont(ctx,16,600); ctx.fillStyle='#1f2329'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(name, x+CONTENT_W/2, y+BLOCK_TOP+15); ctx.textAlign='left'; } };
}
function prepareChat(chat, ctx, imageMap, settings){
  const blocks=[ prepareChatHeader(chat, ctx) ];
  chat.messages.forEach(msg=> blocks.push(prepareMessage(msg, chat, ctx, imageMap, settings)));
  return blocks;
}
function prepareMessage(msg, chat, ctx, imageMap, settings){
  const sender=chat.members.find(m=>m.id===msg.senderId)||null;
  const isMe=!!(sender&&sender.isMe);
  const AV=WX_AV, GAP=WX_GAP, PADY=WX_PADY, PADX=WX_PADX;
  const maxBubbleW=CONTENT_W - AV - GAP - 4;
  const avatarImg=(sender&&sender.avatar&&imageMap.get(sender.avatar.id))?imageMap.get(sender.avatar.id):null;
  const showName=(chat.type==='group'&&!isMe&&sender);

  if(msg.isSystem || msg.type==='system'){
    const text=(msg.nudge)?nudgeText(msg.nudge, chat):((msg.kind==='timestamp')?(msg.text||''):'');
    setFont(ctx,13,400); const lines=text?wrapText(ctx,text,CONTENT_W-20):[''];
    const h=BLOCK_TOP+Math.max(lines.length,1)*18+6;
    return { kind:'sys', height:h, separator:false, draw(ctx,x,y){ setFont(ctx,13,400); ctx.fillStyle='#b3b3b3'; ctx.textAlign='center'; ctx.textBaseline='middle'; const ly=y+BLOCK_TOP; lines.forEach((ln,i)=> ctx.fillText(ln, x+CONTENT_W/2, ly+9+i*18)); ctx.textAlign='left'; } };
  }

  // 系统提示（撤回/拒收）：与 DOM 行为一致，原气泡保留，下方追加系统提示。
  let sysText='', sysLines=[], sysH=0;
  if(msg.withdrawn || msg.blocked){
    sysText = msg.withdrawn ? (senderName(sender,isMe)+' 撤回了一条消息') : '消息已发出，但被对方拒收了';
    setFont(ctx,13,400); sysLines=wrapText(ctx, sysText, CONTENT_W-20);
    sysH = BLOCK_TOP + Math.max(sysLines.length,1)*18 + 6;
  }

  let quoteLines=null, quoteH=0;
  if(msg.quote && msg.quote.snippet){ setFont(ctx,12,400); quoteLines=wrapText(ctx, msg.quote.snippet, maxBubbleW-2*PADX); quoteH=quoteLines.length*WX_QUOTE_LH; }

  let type=msg.type;
  let textLines=[], img=null, imgW=0, imgH=0, voiceLines=null, duration=0, waveBars=0;
  if(type==='image'){
    if(msg.image && imageMap.get(msg.image.id)){ img=imageMap.get(msg.image.id); const w=Math.min(180, maxBubbleW); imgW=w; imgH=Math.round(w*img.height/img.width); }
    if(msg.text){ setFont(ctx,15,400); textLines=wrapText(ctx, msg.text, maxBubbleW-2*PADX); }
  } else if(type==='voice'){
    const v=msg.voice||{durationSec:1, transcript:''}; duration=v.durationSec||1;
    waveBars=Math.max(8, Math.min(26, Math.round(duration*2.2)));
    if(v.transcript){ setFont(ctx,13,400); voiceLines=wrapText(ctx, v.transcript, maxBubbleW-2*PADX); }
  } else {
    setFont(ctx,15,400); textLines=wrapText(ctx, msg.text||'', maxBubbleW-2*PADX);
  }

  let bubbleW=Math.min(maxBubbleW, 180);
  let contentH=0;
  if(type==='image'){
    contentH+=imgH||20;
    if(textLines.length){ contentH+=4+textLines.length*WX_BUBBLE_LH; const mw=maxLineWidth(ctx,textLines); bubbleW=Math.max(imgW, Math.min(maxBubbleW, mw+2*PADX)); }
    else bubbleW=imgW||Math.min(maxBubbleW,180);
  } else if(type==='voice'){
    contentH+=WX_VOICE_H;
    if(voiceLines && voiceLines.length){ contentH+=4+voiceLines.length*WX_QUOTE_LH; const mw=maxLineWidth(ctx,voiceLines); bubbleW=Math.max(150, Math.min(maxBubbleW, mw+2*PADX)); }
    else bubbleW=150;
  } else {
    const mw=maxLineWidth(ctx,textLines); bubbleW=Math.min(maxBubbleW, Math.max(44, mw+2*PADX));
    contentH+=Math.max(textLines.length,1)*WX_BUBBLE_LH;
  }
  const bubbleH=PADY*2 + quoteH + contentH;
  const rowH=Math.max(AV, bubbleH);
  const h=BLOCK_TOP + (showName?WX_NAME_H:0) + rowH + 6 + sysH;

  const waveSeed=hashStr(msg.id||'x');
  const bSenderName=(sender?sender.name:null);
  const bDuration=Math.max(1,duration), bWaveBars=waveBars, bWaveSeed=waveSeed;
  const bIsMe=isMe, bType=type, bAvatarImg=avatarImg, bShowName=showName;
  const bImg=img, bImgW=imgW, bImgH=imgH, bTextLines=textLines, bVoiceLines=voiceLines, bQuoteLines=quoteLines;
  const bBubbleW=bubbleW, bBubbleH=bubbleH, bQuoteH=quoteH;
  const bWithdrawn=!!msg.withdrawn, bSysText=sysText, bSysH=sysH, bSysLines=sysLines;

  return { kind:'msg', height:h, separator:false, breakAfter:!!msg.pageBreak,
    draw(ctx,x,y){
      let cy=y+BLOCK_TOP;
      if(bShowName){ setFont(ctx,12,400); ctx.fillStyle='#9a9a9a'; ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillText(bSenderName||'成员', x+AV+GAP, cy+WX_NAME_H/2); cy+=WX_NAME_H; }
      const rowTop=cy;
      const bx = bIsMe ? (x+CONTENT_W-bBubbleW) : (x+AV+GAP);
      const avatarX = bIsMe ? (x+CONTENT_W-AV) : x;
      drawAvatarWx(ctx, bAvatarImg, bSenderName, avatarX, rowTop, AV);
      const bPrevAlpha=ctx.globalAlpha; if(bWithdrawn) ctx.globalAlpha=0.55;
      const by=rowTop;
      ctx.fillStyle=bIsMe?'#95EC69':'#ffffff';
      roundRect(ctx,bx,by,bBubbleW,bBubbleH,8); ctx.fill();
      if(!bIsMe){ ctx.strokeStyle='#e3e3e3'; ctx.lineWidth=1; ctx.stroke(); }
      const triS=8;
      ctx.fillStyle=bIsMe?'#95EC69':'#ffffff';
      ctx.beginPath();
      if(bIsMe){ ctx.moveTo(bx+bBubbleW, by+12); ctx.lineTo(bx+bBubbleW+triS, by+12+triS/2); ctx.lineTo(bx+bBubbleW, by+12+triS); }
      else { ctx.moveTo(bx, by+12); ctx.lineTo(bx-triS, by+12+triS/2); ctx.lineTo(bx, by+12+triS); }
      ctx.closePath(); ctx.fill();

function splitByManualBreaks(blocks, pageHeight, measureFn){

  if(cur.length) segments.push(cur);
  const pages=[];
  segments.forEach(seg=>{ const ps=splitPages(seg, pageHeight, measureFn); ps.forEach(p=> pages.push(p)); });

const OfflineQueue = {
  load(){ try{ return JSON.parse(localStorage.getItem(__SYNC_QUEUE_KEY) || '[]'); }catch(e){ return []; } },
  save(q){ try{ localStorage.setItem(__SYNC_QUEUE_KEY, JSON.stringify(q)); }catch(e){} },
  enqueue(op){ const q=this.load(); if(q.some(x=>x.id===op.id && x.op===op.op)) return; q.push(op); this.save(q); updatePendingCount(); },
  remove(id){ const q=this.load().filter(x=>x.id!==id); this.save(q); updatePendingCount(); },
  pendingCount(){ return this.load().length; }

async function pushProject(p){
  const sb = await getSb();
  const userId = state.userId;
  if(!sb || !userId){ OfflineQueue.enqueue({op:'push', id:p.id}); return false; }
  try{
    const { error } = await sb.from('projects').upsert(toCloudRow(p, userId), { onConflict:'id' });
    if(error) throw error;
  }catch(e){
    console.warn('[sync] push failed', e);
    OfflineQueue.enqueue({op:'push', id:p.id});
    return false;
  }
  OfflineQueue.remove(p.id);
  // 标记这是本页面自己刚推送的项目，Realtime 把同一事件推回来时忽略，避免误弹"其他设备更新"窗。

  if(!data) return null;
  const cloud = fromCloudRow(data);
  const local = (state.currentProject && state.currentProject.id===id) ? state.currentProject : (await idbGet(id));
  const localU = local ? (local.updatedAt || 0) : 0;
  const cloudU = cloud.updatedAt || 0;
  if(cloudU > localU + 2000){
    await idbPut(cloud);
    if(state.currentProject && state.currentProject.id===id){ state.currentProject = normalizeProject(cloud); render(); }
    return cloud;

}

async function pullAllAndMerge(){
  const cloudList = await pullAll();

  const localList = state.projects || [];
  const localMap = new Map(localList.map(p=>[p.id, p]));

  for(const c of cloudList){
    const local = localMap.get(c.id);
    if(!local){
      // 云端有、本地无：近期项目视为其他设备新建，正常拉回；
      // 老旧残留（>14天）大概率是已删的云端幽灵，跳过并静默清云端，避免回到首页。

  const local = (state.projects || []).find(p=>p.id===cloud.id)
    || ((state.currentProject && state.currentProject.id===cloud.id) ? state.currentProject : null);
  if(!local){
    // 本地无此项目：用户已删除或从未拥有，云端是历史残留（幽灵）。
    // 不弹同步窗打扰用户，并静默尝试从云端彻底清除，避免反复骚扰。
    try{ await deleteProject(cloud.id); }catch(e){}
    return;
  }

  const cloudU = cloud.updatedAt || 0;
  if(cloudU > localU + 2000){
    // 决策抑制：30s 内同一项目已处理过同步冲突，则不再弹窗，直接本地优先推送
    const lastResolved = state.__syncResolved[cloud.id] || 0;
    if(Date.now() - lastResolved < 30000){
      if(local) pushProject(local);
      return;
    }
    // 弹窗抑制锁：已有同项目同步窗在显示，不叠加
    if(state.__syncModalOpen && state.__syncModalId===cloud.id){ return; }
    const ok = await new Promise(resolve=>{
      state.__syncModalOpen = true; state.__syncModalId = cloud.id;
      const body=el('div',{class:'modal-body'});
      body.appendChild(el('p',{}, '其他设备更新了「' + (cloud.title||'未命名小说') + '」，是否拉取最新版本？'));
      const row=el('div',{class:'modal-row modal-actions'});
      const cancel=el('button',{class:'btn btn-ghost'}, '取消');
      const okBtn=el('button',{class:'btn btn-primary'}, '确认');
      row.appendChild(cancel); row.appendChild(okBtn);
      body.appendChild(row);
      const closeFn=openModal(body);
      const done=(v)=>{ state.__syncModalOpen=false; state.__syncModalId=null; closeFn(); resolve(v); };
      cancel.addEventListener('click',()=>{ state.__syncResolved[cloud.id]=Date.now(); done(false); });
      okBtn.addEventListener('click',()=>{ state.__syncResolved[cloud.id]=Date.now(); done(true); });
    });
    if(ok){
      const inside = !!(state.currentProject && state.currentProject.id===cloud.id);
      if(inside){ await goHome(); }           // 若正在该项目内，先弹回列表
      showSyncSpinner('正在同步中…');
      try{
        await idbPut(cloud);
        state.projects = (state.projects||[]).map(p=> p.id===cloud.id ? cloud : p);
        if(state.currentProject && state.currentProject.id===cloud.id){ state.currentProject = normalizeProject(cloud); }
        render();
        await new Promise(r=>setTimeout(r, 500)); // 确保圈圈可见
      } finally {
        hideSyncSpinner();
      }
    } else if(local){ pushProject(local); }
  } else if(local && cloudU <= localU){ pushProject(local); }
}

const __ACCOUNT_PROFILE_KEY = 'fn_account_profile';

function getAccountProfile(){
  try{ return JSON.parse(localStorage.getItem(__ACCOUNT_PROFILE_KEY) || 'null'); }catch(e){ return null; }
}
function saveAccountProfile(patch){
  const cur = getAccountProfile() || {};
  const next = Object.assign({}, cur, patch);
  try{ localStorage.setItem(__ACCOUNT_PROFILE_KEY, JSON.stringify(next)); }catch(e){ console.warn('[account] save failed', e); }
}
function getDisplayName(){

function avatarBgColor(seed){
  seed = (seed || '').trim();

  let h = 0;
  for(let i=0; i<seed.length; i++){ h = (h*31 + seed.charCodeAt(i)) % 360; }

  __loginOverlay = ov;
  submit.addEventListener('click', ()=> doLogin());
  toggle.addEventListener('click', ()=>{ __loginIsRegister=!__loginIsRegister; updateLoginMode(); });
  reset.addEventListener('click', ()=> doReset());

function updateLoginMode(){
  const submit = document.getElementById('login-submit');
  const toggle = document.getElementById('login-toggle');
  if(__loginIsRegister){ if(submit) submit.textContent='注册'; if(toggle) toggle.textContent='去登录'; }
  else { if(submit) submit.textContent='登录'; if(toggle) toggle.textContent='注册'; }
}
function updateLoginStatus(){
  const s = document.getElementById('login-status');
  if(s) s.textContent = state.isOnline ? '● 在线' : '● 离线（可进入离线模式）';
  refreshAccountBtn();
}
function showLoginOverlay(){
  if(!__loginOverlay) buildLoginOverlay();
  if(__loginOverlay) __loginOverlay.classList.remove('hidden');
  updateLoginStatus();
}
function hideLoginOverlay(){ if(__loginOverlay) __loginOverlay.classList.add('hidden'); }
function loginVisible(){ return !!__loginOverlay && !__loginOverlay.classList.contains('hidden'); }
function loginError(msg){ const e=document.getElementById('login-err'); if(e) e.textContent=msg||''; }
function getLoginEmail(){ const e=document.getElementById('login-email'); return e? e.value.trim() : ''; }
function getLoginPwd(){ const e=document.getElementById('login-pwd'); return e? e.value : ''; }
function setLoginBusy(b){
  const s=document.getElementById('login-submit');
  if(s){ s.disabled=b; s.textContent = b ? (__loginIsRegister?'注册中…':'登录中…') : (__loginIsRegister?'注册':'登录'); }
}
function validateEmail(e){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
function translateAuthError(e){
  const m = (e && (e.message || e.error_description || String(e))) || '';
  const s = String(m).toLowerCase();
  if(s.includes('invalid login credentials') || s.includes('invalid credentials')) return '邮箱或密码错误';
  if(s.includes('already been registered') || s.includes('user already registered')) return '该邮箱已注册，请直接登录';
  if(s.includes('email not confirmed') || s.includes('not confirmed')) return '邮箱尚未验证，请查收验证邮件后登录';
  if(s.includes('password should be at least')) return '密码长度至少 6 位';
  if(s.includes('unable to validate email') || s.includes('invalid email')) return '邮箱格式不正确';
  if(s.includes('network') || s.includes('failed to fetch') || s.includes('timeout')) return '网络异常，请检查网络或进入离线模式';
  if(s.includes('offline')) return '当前为离线状态，请联网后重试或进入离线模式';
  return '操作失败：' + (m || '未知错误');
}
async function doLogin(){
  const email = getLoginEmail(); const pwd = getLoginPwd();
  loginError('');
  if(!validateEmail(email)){ loginError('请输入有效的邮箱地址'); return; }
  if(pwd.length < 6){ loginError('密码至少 6 位'); return; }
  setLoginBusy(true);
  try{
    const sb = await getSb();
    if(!sb){ loginError('网络不可用，无法连接云端。可进入离线模式。'); setLoginBusy(false); return; }
    if(__loginIsRegister){
      const { data, error } = await sb.auth.signUp({ email, password: pwd });
      if(error) throw error;
      if(data.session){ hideLoginOverlay(); await handleSignedIn(data.session); }
      else { loginError('注册成功！请查收验证邮件完成激活，再返回登录。'); __loginIsRegister=false; updateLoginMode(); setLoginBusy(false); }
    } else {
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
      if(error) throw error;
      hideLoginOverlay();
      await handleSignedIn(data.session);
    }
  }catch(e){ loginError(translateAuthError(e)); }
  finally{ setLoginBusy(false); }
}
async function doReset(){
  const email = getLoginEmail();
  if(!validateEmail(email)){ loginError('请输入有效的邮箱地址'); return; }
  try{
    const sb = await getSb(); if(!sb) throw new Error('offline');
    const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: location.origin + location.pathname });
    if(error) throw error;
    loginError('重置链接已发送至 ' + email + '，请查收邮件。');
  }catch(e){ loginError(translateAuthError(e)); }
}
async function doLogout(){
  const ok = await confirmDialog('确定退出登录？本地作品会保留，可离线查看。', '确认退出');
  if(!ok) return;
  try{ await authSignOut(); }catch(e){}
  /* onAuthStateChange SIGNED_OUT → handleSignedOut */
}

async function maybeShowMigration(){

  let cloudIds;

  catch(e){ cloudIds = new Set(); }
  const toMigrate = localList.filter(p=> !cloudIds.has(p.id));

/* ===== Sync: 会话保持 / 路由守卫 ===== */
function setupAuthListener(){
  getSb().then(sb=>{
    if(!sb) return;
    sb.auth.onAuthStateChange((event, session)=>{
      if(session && session.user){ handleSignedIn(session); }
      else if(event==='SIGNED_OUT'){ handleSignedOut(); }
      else if(event==='INITIAL_SESSION'){ showLoginOverlay(); }
    });
    setTimeout(async ()=>{
      if(__authReady) return;
      const s = await authGetSession();
      if(s && s.user) handleSignedIn(s);
      else if(!loginVisible()) showLoginOverlay();
    }, 1500);
  });
}
async function handleSignedIn(session){
  __authReady = true;
  state.session = session;
  state.userId = (session.user && session.user.id) || null;
  state.userEmail = (session.user && session.user.email) || null;
  state.offlineMode = false;
  refreshSyncBar();
  try{ await pullAllAndMerge(); }catch(e){ console.warn('[sync] pullAllAndMerge failed', e); }
  if(state.view==='home') render();
  if(!__migrationDone){ try{ await maybeShowMigration(); }catch(e){ console.warn('[sync] migration', e); } }
  subscribeRealtime();
  flushQueue();
  /* 登录 + 迁移流程全部结束后，刷新首页常驻头像按钮（登录态/头像/在线点） */
  refreshAccountBtn();
}
async function handleSignedOut(){
  __authReady = false;
  __migrationDone = false;
  state.userId = null; state.userEmail = null; state.session = null; state.offlineMode = false;
  if(state.__realtimeSub){ try{ state.__realtimeSub.unsubscribe(); }catch(e){} state.__realtimeSub = null; }
  showLoginOverlay();
  refreshSyncBar();
  refreshAccountBtn();
}

/* ===== Sync: 网络状态 ===== */
function onNetworkChange(){
  state.isOnline = navigator.onLine;
  updateLoginStatus();
  refreshSyncBar();
  refreshAccountBtn();
  if(state.isOnline && state.userId) flushQueue();
}

/* ===== Sync: 启动钩子（initSync，挂在 DOMContentLoaded 末尾） ===== */
function augmentState(){
  state.cloudTimer = null;
  state.syncStatus = 'idle';
  state.isOnline = navigator.onLine;
  state.pendingSync = 0;
  state.userId = null;
  state.userEmail = null;
  state.session = null;
  state.offlineMode = false;
  state.__realtimeSub = null;
}
function wrapRender(){
  const orig = render;
  render = function(){ orig(); try{ refreshAccountBtn(); }catch(e){ console.warn('[sync] refreshAccountBtn', e); } };
}
function wrapOpenProject(){
  const orig = openProject;
  openProject = async function(id){
    await orig(id);
    if(state.userId && state.currentProject && state.currentProject.id===id){
      try{ await pullLatest(id); }catch(e){ console.warn('[sync] open pull failed', e); }
    }
  };
}
function wrapScheduleSave(){
  const orig = scheduleSave;
  scheduleSave = function(){ orig(); try{ scheduleCloudSync(); }catch(e){ console.warn('[sync] scheduleCloudSync', e); } };
}
function wrapIdbDelete(){
  const orig = idbDelete;
  idbDelete = async function(id){
    await orig(id);
    if(state.userId){
      if(state.isOnline){ try{ await deleteProject(id); }catch(e){ OfflineQueue.enqueue({op:'delete', id}); } }
      else { OfflineQueue.enqueue({op:'delete', id}); }
    }
  };
}

/* ===== Sync: 轻量 toast ===== */
function toast(msg){
  if(!__toastEl){ __toastEl = el('div', { class:'toast' }); document.body.appendChild(__toastEl); }
  __toastEl.textContent = msg; __toastEl.classList.add('show');
  if(__toastTimer) clearTimeout(__toastTimer);
  __toastTimer = setTimeout(()=>{ if(__toastEl) __toastEl.classList.remove('show'); }, 1800);
}

/* ===== Sync: initSync 入口 ===== */
async function initSync(){
  augmentState();
  wrapRender();
  wrapOpenProject();
  wrapScheduleSave();
  wrapIdbDelete();
  buildLoginOverlay();
  window.addEventListener('online', onNetworkChange);
  window.addEventListener('offline', onNetworkChange);
  if(state.isEmbedded) return; /* 导出页不启用登录/同步 */
  const sb = await getSb();
  if(!sb){
    /* CDN 不可达 / 离线 → 离线模式，不强制登录 */
    state.offlineMode = true;
    refreshSyncBar();
    return;
  }
  setupAuthListener();
}
</script>
